name: E

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */5 * * *'

jobs:
  e:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - run: |
          $R = -join ((65..90) + (97..122) | Get-Random -Count 7 | ForEach-Object {[char]$_})
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile "$env:TEMP\tailscale.msi"
          msiexec /i "$env:TEMP\tailscale.msi" /quiet /norestart
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TS_KEY }} --hostname=exit-$R --advertise-exit-node --accept-routes
          $IP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "========================================="
          Write-Host "Exit Node Name: exit-$R"
          Write-Host "Exit Node IP: $IP"
          Write-Host "========================================="
          Write-Host "On your phone:"
          Write-Host "1. Open Tailscale app"
          Write-Host "2. Tap Exit Node"
          Write-Host "3. Select 'exit-$R'"
          Write-Host "4. Run speedtest - you'll see 2+ Gbps"
          Write-Host "========================================="
          while ($true) {
              Write-Host "[$(Get-Date)] Exit Node Active - $(Get-Date)"
              Start-Sleep -Seconds 300
          }
