name: WIN-EXIT-RDP

on:
  workflow_dispatch:
  schedule:
    - cron: '23 */5 * * *'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - run: |
          # Generate random hostname
          $R = -join ((65..90) + (97..122) | Get-Random -Count 7 | ForEach-Object {[char]$_})
          $HOSTNAME = "win-exit-$R"
          Write-Host "========================================="
          Write-Host "Starting $HOSTNAME on Windows runner"
          Write-Host "========================================="

          # ------------------------------
          # 1. Enable RDP and configure firewall
          # ------------------------------
          Write-Host ">>> Enabling RDP..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-TS" 2>$null
          netsh advfirewall firewall add rule name="RDP-TS" dir=in action=allow protocol=TCP localport=3389

          # ------------------------------
          # 2. Create RDP user (zygor / 4327)
          # ------------------------------
          Write-Host ">>> Creating user zygor (password 4327)..."
          net user zygor 4327 /add
          net localgroup Administrators zygor /add
          net localgroup "Remote Desktop Users" zygor /add

          # ------------------------------
          # 3. Install Tailscale
          # ------------------------------
          Write-Host ">>> Installing Tailscale..."
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installer = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installer -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$installer`" /quiet /norestart" -Wait
          Start-Sleep -Seconds 10

          # Locate tailscale.exe
          $tsExe = Get-ChildItem -Path "C:\Program Files", "C:\Program Files (x86)" -Recurse -Filter "tailscale.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $tsExe) {
              Write-Error "Tailscale not found"
              exit 1
          }
          Write-Host "Tailscale found at: $($tsExe.FullName)"

          # ------------------------------
          # 4. Connect to Tailscale (exit node)
          # ------------------------------
          Write-Host ">>> Connecting to Tailscale as exit node..."
          & $tsExe.FullName up --authkey=${{ secrets.TS_KEY }} --hostname=$HOSTNAME --advertise-exit-node --accept-routes
          Start-Sleep -Seconds 5
          $TS_IP = & $tsExe.FullName ip -4
          Write-Host "Tailscale IP: $TS_IP"

          # ------------------------------
          # 5. Output connection details
          # ------------------------------
          Write-Host "========================================="
          Write-Host "✅ WINDOWS EXIT NODE + RDP READY"
          Write-Host "Tailscale node name: $HOSTNAME"
          Write-Host "Tailscale IP:       $TS_IP"
          Write-Host ""
          Write-Host "📱 ON YOUR ANDROID PHONE:"
          Write-Host "   1. Open Tailscale app"
          Write-Host "   2. Exit node → select '$HOSTNAME'"
          Write-Host "   3. Your phone's internet will use GitHub's fast network"
          Write-Host "   4. Open Microsoft Remote Desktop app"
          Write-Host "   5. Connect to $TS_IP`:3389"
          Write-Host "   6. Username: zygor"
          Write-Host "   7. Password: 4327"
          Write-Host "========================================="

          # ------------------------------
          # 6. Watchdog – keep alive
          # ------------------------------
          while ($true) {
              # Check Tailscale connectivity
              $status = & $tsExe.FullName status 2>$null
              if (-not $status -or $status -notmatch "Connected") {
                  Write-Host "⚠️ Tailscale down – reconnecting..."
                  & $tsExe.FullName up --authkey=${{ secrets.TS_KEY }} --hostname=$HOSTNAME --advertise-exit-node --accept-routes
                  Start-Sleep -Seconds 5
              }
              Write-Host "[$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')] $HOSTNAME active on $TS_IP"
              Start-Sleep -Seconds 300
          }
