name: EXIT-RDP

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */5 * * *'

jobs:
  start:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - run: |
          set -e
          R=$(head /dev/urandom | tr -dc a-z0-9 | head -c7)
          HOST="exit-$R"
          echo "========================================="
          echo "Starting $HOST"
          echo "========================================="

          # Kernel optimisations for Tailscale (UDP)
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1
          sudo sysctl -w net.core.rmem_max=2500000
          sudo sysctl -w net.core.wmem_max=2500000
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr
          sudo sysctl -w net.core.default_qdisc=fq

          # Install Tailscale
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TS_KEY }} \
            --hostname="$HOST" \
            --advertise-exit-node \
            --accept-routes \
            --reset
          TS_IP=$(tailscale ip -4)

          # Install lightweight desktop (XFCE) and RDP server
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies xrdp
          echo xfce4-session > ~/.xsession
          sudo systemctl restart xrdp

          # Create user zygor / pass 4327
          sudo useradd -m -s /bin/bash zygor
          echo "zygor:4327" | sudo chpasswd
          sudo usermod -aG sudo,ssl-cert,xrdp zygor

          # Optimise RDP for mobile (low bandwidth)
          sudo sed -i 's/^max_bpp=.*/max_bpp=16/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/^xserverbpp=.*/xserverbpp=16/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/^use_compression=.*/use_compression=yes/' /etc/xrdp/xrdp.ini
          sudo systemctl restart xrdp

          # Firewall – allow RDP only from Tailscale
          sudo ufw allow from 100.64.0.0/10 to any port 3389 proto tcp
          echo "y" | sudo ufw enable

          # Display connection info
          echo "========================================="
          echo "✅ EXIT NODE + RDP READY"
          echo "Tailscale node: $HOST"
          echo "Tailscale IP:   $TS_IP"
          echo ""
          echo "📱 ON YOUR PHONE:"
          echo "   Tailscale app → Exit node → $HOST"
          echo "   Then RDP to $TS_IP:3389"
          echo "   Username: zygor"
          echo "   Password: 4327"
          echo "========================================="

          # Watchdog – keep alive
          while true; do
            tailscale status || sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname="$HOST" --advertise-exit-node --accept-routes --reset
            systemctl is-active xrdp || sudo systemctl restart xrdp
            echo "[$(date -u +'%H:%M:%S UTC')] $HOST active on $TS_IP"
            sleep 300
          done
