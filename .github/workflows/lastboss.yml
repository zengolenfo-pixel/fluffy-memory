name: E

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */5 * * *'

jobs:
  e:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - run: |
          Write-Host "=== STEP 1: Generate random hostname ==="
          $R = -join ((65..90) + (97..122) | Get-Random -Count 7 | ForEach-Object {[char]$_})
          Write-Host "Generated hostname: exit-$R"
          
          Write-Host "=== STEP 2: Download Tailscale installer ==="
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath -UseBasicParsing
          Write-Host "Download complete: $installerPath"
          
          Write-Host "=== STEP 3: Install Tailscale silently ==="
          $process = Start-Process msiexec.exe -ArgumentList "/i `"$installerPath`" /quiet /norestart" -Wait -PassThru
          Write-Host "msiexec exit code: $($process.ExitCode)"
          
          Write-Host "=== STEP 4: Wait for installation to finalize ==="
          Start-Sleep -Seconds 10
          
          Write-Host "=== STEP 5: Locate tailscale.exe ==="
          $possiblePaths = @(
              "C:\Program Files\Tailscale\tailscale.exe",
              "C:\Program Files (x86)\Tailscale\tailscale.exe",
              "$env:ProgramFiles\Tailscale\tailscale.exe",
              "${env:ProgramFiles(x86)}\Tailscale\tailscale.exe"
          )
          $tailscaleExe = $null
          foreach ($path in $possiblePaths) {
              if (Test-Path $path) {
                  $tailscaleExe = $path
                  Write-Host "Found Tailscale at: $tailscaleExe"
                  break
              }
          }
          
          if (-not $tailscaleExe) {
              Write-Host "ERROR: Tailscale not found in any expected location."
              Write-Host "Searching entire C:\Program Files..."
              $found = Get-ChildItem -Path "C:\Program Files", "C:\Program Files (x86)" -Recurse -Filter "tailscale.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) {
                  $tailscaleExe = $found.FullName
                  Write-Host "Found at: $tailscaleExe"
              } else {
                  Write-Host "Tailscale installation failed. Exiting."
                  exit 1
              }
          }
          
          Write-Host "=== STEP 6: Ensure Tailscale service is ready ==="
          Start-Sleep -Seconds 5
          
          Write-Host "=== STEP 7: Connect to Tailscale network ==="
          & $tailscaleExe up --authkey=${{ secrets.TS_KEY }} --hostname=exit-$R --advertise-exit-node --accept-routes
          
          Write-Host "=== STEP 8: Get Tailscale IP ==="
          Start-Sleep -Seconds 5
          $IP = & $tailscaleExe ip -4
          Write-Host "Tailscale IPv4: $IP"
          
          Write-Host "========================================="
          Write-Host "✅ EXIT NODE IS LIVE"
          Write-Host "Name: exit-$R"
          Write-Host "IP: $IP"
          Write-Host "========================================="
          Write-Host "📱 ON YOUR PHONE:"
          Write-Host "1. Open Tailscale app (same account)"
          Write-Host "2. Tap 'Exit Node'"
          Write-Host "3. Select 'exit-$R'"
          Write-Host "4. Run speedtest → you will see Gbps speeds"
          Write-Host "========================================="
          Write-Host "⚠️  This runner stays alive for max 6 hours."
          Write-Host "🔄 Cron restarts every 5 hours for unlimited uptime."
          Write-Host "========================================="
          
          Write-Host "=== STEP 9: Keep alive (watchdog) ==="
          while ($true) {
              Write-Host "[$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')] Exit Node Active - $IP"
              Start-Sleep -Seconds 300
          }
