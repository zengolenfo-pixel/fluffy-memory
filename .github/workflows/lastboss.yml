name: R

on:
  workflow_dispatch:
  schedule:
    - cron: '19 */5 * * *'

jobs:
  r:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - run: |
          R=$(head /dev/urandom | tr -dc a-z0-9 | head -c7)
          sudo sysctl -w net.ipv4.ip_forward=1 net.ipv6.conf.all.forwarding=1
          sudo sysctl -w net.core.rmem_max=2500000 net.core.wmem_max=2500000
          sudo sysctl -w net.ipv4.tcp_rmem='4096 87380 2500000' net.ipv4.tcp_wmem='4096 65536 2500000'
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr net.core.default_qdisc=fq
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=ep-$R --advertise-exit-node --accept-routes --reset
          sudo apt update && sudo apt install -y xrdp xfce4 xfce4-goodies
          echo xfce4-session > ~/.xsession
          sudo systemctl restart xrdp
          sudo ufw allow 3389/tcp
          P=$(tr -dc A-Za-z0-9 < /dev/urandom | head -c12)
          echo -e "$P\n$P" | sudo passwd runner
          IP=$(tailscale ip -4)
          cat <<EOF
          =============================================
          TAILSCALE EXIT NODE + RDP SERVER LIVE
          =============================================
          RDP Address: $IP:3389
          Username: runner
          Password: $P
          Exit node name: ep-$R
          =============================================
          EOF
          while true; do
            tailscale status || sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=ep-$R --advertise-exit-node --accept-routes --reset
            sudo systemctl is-active xrdp || sudo systemctl restart xrdp
            sleep 240
          done
