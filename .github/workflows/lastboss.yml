name: WIN-EXIT-RDP

on:
  workflow_dispatch:
  schedule:
    - cron: '23 */5 * * *'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - run: |
          # Generate random hostname and credentials
          $R = -join ((65..90) + (97..122) | Get-Random -Count 7 | ForEach-Object {[char]$_})
          $HOSTNAME = "win-exit-$R"
          $USER = -join ((97..122) | Get-Random -Count 6 | ForEach-Object {[char]$_})
          $PASS = -join ((33..126) | Get-Random -Count 12 | ForEach-Object {[char]$_})
          Write-Host "========================================="
          Write-Host "Starting $HOSTNAME"
          Write-Host "Generated credentials:"
          Write-Host "   Username: $USER"
          Write-Host "   Password: $PASS"
          Write-Host "========================================="

          # Enable RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-TS" 2>$null
          netsh advfirewall firewall add rule name="RDP-TS" dir=in action=allow protocol=TCP localport=3389

          # Create user with random credentials
          net user $USER $PASS /add /passwordchg:no /expires:never
          net localgroup Administrators $USER /add
          net localgroup "Remote Desktop Users" $USER /add

          # Verify user creation
          if (-not (net user $USER 2>$null)) {
              Write-Error "User creation failed"
              exit 1
          }
          Write-Host "User $USER created successfully"

          # Install Tailscale
          Write-Host "Installing Tailscale..."
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile "$env:TEMP\tailscale.msi" -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$env:TEMP\tailscale.msi`" /quiet /norestart" -Wait
          Start-Sleep -Seconds 10

          # Locate tailscale.exe
          $tsExe = Get-ChildItem -Path "C:\Program Files", "C:\Program Files (x86)" -Recurse -Filter "tailscale.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $tsExe) {
              Write-Error "Tailscale not found"
              exit 1
          }

          # Connect to Tailscale as exit node
          Write-Host "Connecting to Tailscale..."
          & $tsExe.FullName up --authkey=${{ secrets.TS_KEY }} --hostname=$HOSTNAME --advertise-exit-node --accept-routes
          Start-Sleep -Seconds 5
          $TS_IP = & $tsExe.FullName ip -4

          # Final output
          Write-Host "========================================="
          Write-Host "✅ WINDOWS EXIT NODE + RDP READY"
          Write-Host "Tailscale node name: $HOSTNAME"
          Write-Host "Tailscale IP:       $TS_IP"
          Write-Host ""
          Write-Host "📱 CONNECTION DETAILS (use these to log in):"
          Write-Host "   RDP Address: $TS_IP`:3389"
          Write-Host "   Username:    $USER"
          Write-Host "   Password:    $PASS"
          Write-Host ""
          Write-Host "📱 ON YOUR PHONE:"
          Write-Host "   1. Open Tailscale app → Exit node → $HOSTNAME"
          Write-Host "   2. Open Remote Desktop app → connect to above address"
          Write-Host "========================================="

          # Watchdog
          while ($true) {
              $status = & $tsExe.FullName status 2>$null
              if (-not $status -or $status -notmatch "Connected") {
                  Write-Host "⚠️ Tailscale down – reconnecting..."
                  & $tsExe.FullName up --authkey=${{ secrets.TS_KEY }} --hostname=$HOSTNAME --advertise-exit-node --accept-routes
              }
              Write-Host "[$(Get-Date -Format 'HH:mm:ss UTC')] $HOSTNAME active on $TS_IP"
              Start-Sleep -Seconds 300
          }
