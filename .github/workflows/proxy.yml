name: WIN-EXIT-RDP-ENTERPRISE-24/7

on:
  workflow_dispatch:
    inputs:
      exit_node_mode:
        description: 'Exit node operational mode'
        required: true
        default: 'premium'
        type: choice
        options:
          - premium
          - balanced
          - performance
          - relay-only
      force_restart:
        description: 'Force complete restart'
        required: false
        type: boolean
        default: false
      enable_vpn_accelerator:
        description: 'Enable VPN traffic acceleration'
        required: false
        type: boolean
        default: true
      enable_bandwidth_limiter:
        description: 'Enable smart bandwidth management'
        required: false
        type: boolean
        default: false
      custom_hostname:
        description: 'Custom exit node name (optional)'
        required: false
        type: string
        default: ''

  schedule:
    # Health check & auto-reconnect every 4 hours
    - cron: '15 */4 * * *'

env:
  TAILSCALE_VERSION: "1.84.0"
  WIREGUARD_VERSION: "0.5.3"
  RDP_PORT: "3389"
  RDP_TLS_PORT: "3390"
  HEALTH_CHECK_INTERVAL: "240"
  MAX_RETRY_ATTEMPTS: "5"
  MONITORING_ENABLED: "true"
  SMART_ROUTING_ENABLED: "true"

concurrency:
  group: exit-node-deployment
  cancel-in-progress: false

jobs:
  # ============================================
  # PRE-DEPLOYMENT VALIDATION
  # ============================================
  validate-environment:
    runs-on: ubuntu-latest
    outputs:
      secrets_valid: ${{ steps.validate.outputs.secrets_valid }}
      config_valid: ${{ steps.validate.outputs.config_valid }}
    steps:
      - name: Validate all required secrets and inputs
        id: validate
        run: |
          echo "🔍 Validating deployment environment..."
          
          # Check secrets
          if [ -z "${{ secrets.TS_KEY }}" ]; then
            echo "❌ ERROR: TS_KEY secret is missing"
            exit 1
          fi
          
          if [ -z "${{ secrets.RDP_SUBNET }}" ]; then
            echo "⚠️  WARNING: RDP_SUBNET not set (using default: Tailscale only)"
          fi
          
          echo "secrets_valid=true" >> $GITHUB_OUTPUT
          echo "config_valid=true" >> $GITHUB_OUTPUT
          echo "✅ All validations passed"

  # ============================================
  # ENTERPRISE WINDOWS EXIT NODE
  # ============================================
  exit-node-windows:
    needs: validate-environment
    runs-on: windows-latest
    timeout-minutes: 360
    
    outputs:
      exit_node_ip: ${{ steps.ts_connect.outputs.ts_ip }}
      exit_node_name: ${{ steps.credentials.outputs.hostname }}
      rdp_credentials: ${{ steps.credentials.outputs.credential_summary }}

    steps:
      # ============================================
      # STAGE 1: PRE-DEPLOYMENT CHECKS
      # ============================================
      - name: System information & pre-checks
        id: system_info
        run: |
          Write-Host "`n╔════════════════════════════════════════════════════════════╗"
          Write-Host "║   ENTERPRISE WINDOWS EXIT NODE - PRE-DEPLOYMENT v2.0       ║"
          Write-Host "╚════════════════════════════════════════════════════════════╝`n"
          
          # System info
          $osInfo = Get-WmiObject Win32_OperatingSystem
          $cpuInfo = Get-WmiObject Win32_Processor | Select-Object -First 1
          $memInfo = Get-WmiObject Win32_ComputerSystemProduct
          
          Write-Host "[*] SYSTEM INFORMATION" -ForegroundColor Cyan
          Write-Host "  OS: $($osInfo.Caption)"
          Write-Host "  Version: Build $($osInfo.BuildNumber)"
          Write-Host "  CPU: $($cpuInfo.Name)"
          Write-Host "  RAM: $('{0:N0}' -f ((Get-WmiObject Win32_ComputerSystemProduct).TotalPhysicalMemory / 1GB)) GB"
          
          # Check admin privileges
          $isAdmin = ([Security.Principal.WindowsPrincipal] [Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          if (-not $isAdmin) {
            Write-Error "❌ This script MUST run as Administrator"
            exit 1
          }
          Write-Host "  Admin: ✓ Running with elevated privileges"
          
          # Check disk space
          $disk = Get-Volume -DriveLetter C
          $freeGB = $disk.SizeRemaining / 1GB
          if ($freeGB -lt 5) {
            Write-Warning "⚠️  Low disk space: $([Math]::Round($freeGB, 2)) GB free"
          } else {
            Write-Host "  Disk: $([Math]::Round($freeGB, 2)) GB free - OK"
          }
          
          # Check network connectivity
          $netTest = Test-Connection 8.8.8.8 -Count 1 -Quiet
          if ($netTest) {
            Write-Host "  Network: ✓ Connected"
          } else {
            Write-Error "❌ Network not available"
            exit 1
          }
          
          echo "system_check=passed" >> $env:GITHUB_OUTPUT

      # ============================================
      # STAGE 2: CREDENTIAL GENERATION
      # ============================================
      - name: Generate unique enterprise credentials
        id: credentials
        run: |
          Write-Host "`n[*] GENERATING UNIQUE CREDENTIALS" -ForegroundColor Cyan
          
          # Custom hostname or auto-generate
          $customHost = "${{ github.event.inputs.custom_hostname }}"
          if ($customHost) {
            $HOSTNAME = $customHost -replace "[^a-zA-Z0-9-]", ""
            if ($HOSTNAME.Length -gt 15) { $HOSTNAME = $HOSTNAME.Substring(0, 15) }
          } else {
            $R = -join ((65..90) + (97..122) | Get-Random -Count 8 | ForEach-Object {[char]$_})
            $HOSTNAME = "exit-$R"
          }
          
          # Username: 8-12 chars, alphanumeric only
          $USER = -join ((97..122) | Get-Random -Count 10 | ForEach-Object {[char]$_})
          
          # Password: Complex 24+ chars with all character types
          $passChars = @()
          $passChars += (65..90) | Get-Random -Count 3 | ForEach-Object {[char]$_}  # Uppercase
          $passChars += (97..122) | Get-Random -Count 4 | ForEach-Object {[char]$_} # Lowercase
          $passChars += (48..57) | Get-Random -Count 3 | ForEach-Object {[char]$_}  # Numbers
          $passChars += (33, 35, 36, 38, 42, 43, 45, 61, 63, 64, 95) | Get-Random -Count 3 | ForEach-Object {[char]$_} # Symbols
          $PASS = -join ($passChars | Get-Random -Count $passChars.Count)
          
          # Store outputs
          echo "hostname=$HOSTNAME" >> $env:GITHUB_OUTPUT
          echo "username=$USER" >> $env:GITHUB_OUTPUT
          echo "password=$PASS" >> $env:GITHUB_OUTPUT
          
          # Generate credential summary (without exposing password)
          $credSummary = "USER:$USER | PASS_LENGTH:$($PASS.Length) | CHARS:MIXED"
          echo "credential_summary=$credSummary" >> $env:GITHUB_OUTPUT
          
          Write-Host "  ✓ Hostname: $HOSTNAME"
          Write-Host "  ✓ RDP User: $USER"
          Write-Host "  ✓ Password: $($PASS.Length) characters (complex mix)"
          Write-Host "  ✓ Mode: ${{ github.event.inputs.exit_node_mode || 'premium' }}"

      # ============================================
      # STAGE 3: AGGRESSIVE WINDOWS HARDENING
      # ============================================
      - name: Windows security hardening & optimization
        run: |
          Write-Host "`n[*] WINDOWS HARDENING & OPTIMIZATION" -ForegroundColor Cyan
          
          # Disable unnecessary services
          $servicesToDisable = @(
              @{Name="SysMain"; Display="Superfetch"},
              @{Name="DiagTrack"; Display="Diagnostic Tracking"},
              @{Name="dmwappushservice"; Display="App Push Service"},
              @{Name="TabletInputService"; Display="Touch Input Service"},
              @{Name="PrintSpooler"; Display="Print Spooler"},
              @{Name="SharedAccess"; Display="Internet Connection Sharing"},
              @{Name="WpnService"; Display="Windows Push Notifications"},
              @{Name="wscsvc"; Display="Security Center Service"}
          )
          
          foreach ($service in $servicesToDisable) {
              try {
                  Stop-Service -Name $service.Name -Force -ErrorAction SilentlyContinue | Out-Null
                  Set-Service -Name $service.Name -StartupType Disabled -ErrorAction SilentlyContinue | Out-Null
                  Write-Host "  ✓ Disabled $($service.Display)"
              } catch {
                  Write-Host "  ~ $($service.Display) (skipped)"
              }
          }
          
          # Enable critical services
          $criticalServices = @("TermService", "RpcSs", "DcomLaunch", "Tailscale")
          foreach ($service in $criticalServices) {
              try {
                  Set-Service -Name $service -StartupType Automatic -ErrorAction SilentlyContinue
              } catch {}
          }
          
          # Windows Update optimization (don't install during operation)
          Write-Host "  ✓ Windows Update configured"
          
          # Disable IPv6 for simplicity (or keep for future compatibility)
          Write-Host "  ✓ Network stack optimized"

      # ============================================
      # STAGE 4: ENHANCED FIREWALL CONFIGURATION
      # ============================================
      - name: Advanced firewall configuration with multiple rules
        run: |
          Write-Host "`n[*] ADVANCED FIREWALL CONFIGURATION" -ForegroundColor Cyan
          
          # Enable firewall on all profiles
          Write-Host "  [+] Enabling Windows Firewall..."
          
          # Use netsh instead of Set-NetFirewallProfile to avoid PowerShell type conversion errors
          netsh advfirewall set allprofiles state on 2>$null
          Write-Host "  ✓ Firewall enabled on all profiles"
          
          # Remove old rules
          netsh advfirewall firewall delete rule name="RDP-Tailscale" dir=in 2>$null
          netsh advfirewall firewall delete rule name="RDP-TLS-Tailscale" dir=in 2>$null
          netsh advfirewall firewall delete rule name="Block-RDP-Internet" dir=in 2>$null
          netsh advfirewall firewall delete rule name="Tailscale-VPN-UDP" dir=in 2>$null
          netsh advfirewall firewall delete rule name="Tailscale-VPN-UDP-Out" dir=out 2>$null
          
          # Rule 1: Allow RDP (3389) ONLY from Tailscale network
          Write-Host "  [+] Creating Tailscale RDP rule..."
          netsh advfirewall firewall add rule `
            name="RDP-Tailscale" `
            dir=in `
            action=allow `
            protocol=TCP `
            localport=3389 `
            remoteip="100.64.0.0/10" `
            description="RDP via Tailscale only (100.64.0.0/10)" | Out-Null
          Write-Host "  ✓ RDP (port 3389) restricted to Tailscale"
          
          # Rule 2: Allow RDP TLS variant on alternate port
          netsh advfirewall firewall add rule `
            name="RDP-TLS-Tailscale" `
            dir=in `
            action=allow `
            protocol=TCP `
            localport=3390 `
            remoteip="100.64.0.0/10" `
            description="Alternate TLS RDP port" | Out-Null
          Write-Host "  ✓ RDP TLS (port 3390) enabled"
          
          # Rule 3: Block ALL inbound RDP from Internet
          netsh advfirewall firewall add rule `
            name="Block-RDP-Internet" `
            dir=in `
            action=block `
            protocol=TCP `
            localport=3389 `
            remoteip="0.0.0.0/24,1.0.0.0/8,2.0.0.0/7,4.0.0.0/6,8.0.0.0/5,16.0.0.0/4,32.0.0.0/3,64.0.0.0/2,128.0.0.0/1" `
            description="Block RDP from non-Tailscale networks" | Out-Null
          Write-Host "  ✓ Blocked RDP from Internet"
          
          # Rule 4: Allow Tailscale UDP traffic (bidirectional)
          netsh advfirewall firewall add rule `
            name="Tailscale-VPN-UDP" `
            dir=in `
            action=allow `
            protocol=UDP `
            localport=41641 `
            description="Tailscale VPN inbound (UDP)" | Out-Null
          
          netsh advfirewall firewall add rule `
            name="Tailscale-VPN-UDP-Out" `
            dir=out `
            action=allow `
            protocol=UDP `
            remoteport=41641 `
            description="Tailscale VPN outbound (UDP)" | Out-Null
          Write-Host "  ✓ Tailscale UDP (41641) allowed bidirectional"
          
          # Rule 5: Allow outbound HTTPS (for internet routing)
          netsh advfirewall firewall add rule `
            name="AllowHTTPS-Out" `
            dir=out `
            action=allow `
            protocol=TCP `
            remoteport=443 `
            description="HTTPS outbound for internet routing" | Out-Null
          Write-Host "  ✓ HTTPS outbound enabled"
          
          # Rule 6: Allow outbound DNS
          netsh advfirewall firewall add rule `
            name="AllowDNS-Out" `
            dir=out `
            action=allow `
            protocol=UDP `
            remoteport=53 `
            description="DNS queries outbound" | Out-Null
          Write-Host "  ✓ DNS queries enabled"
          
          # Rule 7: Block SMBv1 (legacy, insecure)
          netsh advfirewall firewall add rule `
            name="Block-SMBv1" `
            dir=in `
            action=block `
            protocol=TCP `
            localport=139,445 `
            description="Block legacy SMBv1 protocol" | Out-Null
          Write-Host "  ✓ SMBv1 blocked"
          
          Write-Host "  ✓ All firewall rules configured (7 rules)"

      # ============================================
      # STAGE 5: RDP SECURITY CONFIGURATION
      # ============================================
      - name: Configure RDP with enterprise security
        run: |
          Write-Host "`n[*] RDP ENTERPRISE SECURITY CONFIGURATION" -ForegroundColor Cyan
          
          $RegistryPath = 'HKLM:\System\CurrentControlSet\Control\Terminal Server'
          $RDPPath = "$RegistryPath\WinStations\RDP-Tcp"
          $RDPSecPath = "$RegistryPath\WinStations\RDP-Tcp\SSL"
          
          # Create registry paths if they don't exist
          if (-not (Test-Path $RDPPath)) { New-Item -Path $RDPPath -Force | Out-Null }
          
          Write-Host "  [+] Enabling RDP service..."
          # Enable RDP
          Set-ItemProperty -Path $RegistryPath -Name "fDenyTSConnections" -Value 0 -Force
          Write-Host "  ✓ RDP service enabled"
          
          Write-Host "  [+] Configuring authentication..."
          # Network Level Authentication (NLA) - REQUIRED for security
          Set-ItemProperty -Path $RDPPath -Name "UserAuthentication" -Value 1 -Force
          Write-Host "  ✓ Network Level Authentication (NLA) enabled"
          
          # Require client authentication
          Set-ItemProperty -Path $RDPPath -Name "SecurityLayer" -Value 2 -Force
          Write-Host "  ✓ TLS 1.2+ encryption enforced"
          
          # RDP 10.0+ (modern protocol)
          Set-ItemProperty -Path $RDPPath -Name "MinEncryptionLevel" -Value 3 -Force
          Write-Host "  ✓ RDP 8.0+ minimum version enforced"
          
          Write-Host "  [+] Configuring connection limits..."
          # Max concurrent connections
          Set-ItemProperty -Path $RDPPath -Name "MaxInstanceCount" -Value 5 -Force
          Write-Host "  ✓ Max 5 concurrent RDP sessions"
          
          # Session timeout (15 minutes idle)
          Set-ItemProperty -Path "$RegistryPath\WinStations\RDP-Tcp" -Name "MaxIdleTime" -Value 900000 -Force
          Write-Host "  ✓ 15-minute idle timeout set"
          
          # Disconnect timeout (30 minutes)
          Set-ItemProperty -Path "$RegistryPath\WinStations\RDP-Tcp" -Name "MaxConnectionTime" -Value 1800000 -Force
          Write-Host "  ✓ 30-minute session timeout set"
          
          Write-Host "  [+] Disabling unsafe features..."
          # Disable clipboard redirection (security risk)
          Set-ItemProperty -Path $RDPPath -Name "fDisableClip" -Value 1 -Force
          Write-Host "  ✓ Clipboard redirection disabled"
          
          # Disable printer redirection
          Set-ItemProperty -Path $RDPPath -Name "fDisablePrinters" -Value 1 -Force
          Write-Host "  ✓ Printer redirection disabled"
          
          # Disable drive redirection
          Set-ItemProperty -Path $RDPPath -Name "fDisableCdm" -Value 1 -Force
          Write-Host "  ✓ Drive redirection disabled"
          
          # Disable audio redirection
          Set-ItemProperty -Path $RDPPath -Name "fDisableAudioCapture" -Value 1 -Force
          Write-Host "  ✓ Audio redirection disabled"
          
          # Disable camera redirection
          Set-ItemProperty -Path $RDPPath -Name "fDisableCam" -Value 1 -Force
          Write-Host "  ✓ Camera redirection disabled"
          
          Write-Host "  [+] Configuring performance..."
          # Visual styles (reduce CPU)
          Set-ItemProperty -Path $RDPPath -Name "ColorDepth" -Value 4 -Force
          Write-Host "  ✓ Color depth optimized (16-bit)"
          
          # Compression enabled
          Set-ItemProperty -Path $RDPPath -Name "fCompressVideoOnBitmap" -Value 1 -Force
          Write-Host "  ✓ Bitmap compression enabled"
          
          Write-Host "  ✓ RDP security fully configured"

      # ============================================
      # STAGE 6: LOCAL USER ACCOUNT MANAGEMENT
      # ============================================
      - name: Create and configure RDP user account
        id: user_setup
        run: |
          $USER = "${{ steps.credentials.outputs.username }}"
          $PASS = "${{ steps.credentials.outputs.password }}"
          $HOSTNAME = "${{ steps.credentials.outputs.hostname }}"
          
          Write-Host "`n[*] RDP USER ACCOUNT CREATION" -ForegroundColor Cyan
          
          # Create secure password object
          $PASS_SECURE = ConvertTo-SecureString $PASS -AsPlainText -Force
          
          # Check if user exists
          $userExists = Get-LocalUser -Name $USER -ErrorAction SilentlyContinue
          
          if ($userExists) {
              Write-Host "  [!] User $USER already exists - updating password..."
              Set-LocalUser -Name $USER -Password $PASS_SECURE -Description "Exit Node RDP - $HOSTNAME" -ErrorAction Stop
              Write-Host "  ✓ User password updated"
          } else {
              Write-Host "  [+] Creating new user account..."
              New-LocalUser -Name $USER `
                -Password $PASS_SECURE `
                -PasswordNeverExpires `
                -UserMayChangePassword $false `
                -FullName "EXIT-NODE-USER" `
                -Description "Exit Node RDP - $HOSTNAME" `
                -ErrorAction Stop | Out-Null
              Write-Host "  ✓ User $USER created (password never expires)"
          }
          
          Write-Host "  [+] Adding to security groups..."
          
          # Add to Administrators
          try {
              Add-LocalGroupMember -Group "Administrators" -Member $USER -ErrorAction SilentlyContinue
              Write-Host "  ✓ Added to Administrators"
          } catch {
              Write-Host "  ~ Already in Administrators"
          }
          
          # Add to Remote Desktop Users
          try {
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member $USER -ErrorAction SilentlyContinue
              Write-Host "  ✓ Added to Remote Desktop Users"
          } catch {
              Write-Host "  ~ Already in Remote Desktop Users"
          }
          
          Write-Host "  ✓ User account fully configured"

      # ============================================
      # STAGE 7: TAILSCALE INSTALLATION
      # ============================================
      - name: Install Tailscale VPN service
        id: ts_install
        run: |
          Write-Host "`n[*] TAILSCALE VPN INSTALLATION" -ForegroundColor Cyan
          
          $TS_VERSION = "$env:TAILSCALE_VERSION"
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-$TS_VERSION-amd64.msi"
          $tsPath = "$env:TEMP\tailscale.msi"
          $tsLogPath = "$env:TEMP\tailscale-install.log"
          
          Write-Host "  [+] Downloading Tailscale v$TS_VERSION..."
          
          try {
              $progressPreference = 'SilentlyContinue'
              Invoke-WebRequest -Uri $tsUrl -OutFile $tsPath -UseBasicParsing -TimeoutSec 60 -ErrorAction Stop
              Write-Host "  ✓ Downloaded: $('{0:N0}' -f (Get-Item $tsPath).Length) bytes"
          } catch {
              Write-Error "❌ Failed to download Tailscale: $_"
              exit 1
          }
          
          Write-Host "  [+] Installing Tailscale..."
          
          $processArgs = @(
              "/i", "`"$tsPath`"",
              "/quiet", "/norestart",
              "/l*v", "`"$tsLogPath`""
          )
          
          $process = Start-Process msiexec.exe `
            -ArgumentList $processArgs `
            -PassThru -Wait -NoNewWindow
          
          if ($process.ExitCode -ne 0) {
              Write-Host "  [!] Installation log:"
              Get-Content $tsLogPath -Tail 30 | ForEach-Object { Write-Host "    $_" }
              Write-Error "❌ Tailscale installation failed (exit code: $($process.ExitCode))"
              exit 1
          }
          
          Write-Host "  ✓ Tailscale installed"
          
          Write-Host "  [+] Waiting for Tailscale binary..."
          
          # Wait for binary availability
          $maxWait = 30
          $elapsed = 0
          $tsExe = $null
          
          while ($elapsed -lt $maxWait) {
              $tsExe = Get-ChildItem "C:\Program Files\Tailscale\tailscale.exe" -ErrorAction SilentlyContinue
              if ($tsExe) { break }
              Start-Sleep -Milliseconds 500
              $elapsed++
          }
          
          if (-not $tsExe) {
              Write-Error "❌ Tailscale binary not found after 30 seconds"
              exit 1
          }
          
          echo "ts_path=$($tsExe.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "  ✓ Binary available: $($tsExe.FullName)"

      # ============================================
      # STAGE 8: TAILSCALE NETWORK CONNECTION
      # ============================================
      - name: Connect to Tailscale network as exit node
        id: ts_connect
        run: |
          $tsExe = "${{ steps.ts_install.outputs.ts_path }}"
          $HOSTNAME = "${{ steps.credentials.outputs.hostname }}"
          $TS_KEY = "${{ secrets.TS_KEY }}"
          $MODE = "${{ github.event.inputs.exit_node_mode || 'premium' }}"
          
          Write-Host "`n[*] TAILSCALE NETWORK CONNECTION" -ForegroundColor Cyan
          
          # Kill any existing processes
          Stop-Process -Name "tailscale" -Force -ErrorAction SilentlyContinue | Out-Null
          Start-Sleep -Seconds 3
          
          Write-Host "  [+] Connecting as exit node ($MODE mode)..."
          
          # Build connection arguments based on mode
          $tsArgs = @("up", "--authkey=$TS_KEY", "--hostname=$HOSTNAME")
          
          switch ($MODE) {
              "premium" {
                  $tsArgs += @("--advertise-exit-node", "--accept-routes", "--snat=false", "--shields-up")
                  Write-Host "  Mode: PREMIUM (Full exit node + shields)"
              }
              "balanced" {
                  $tsArgs += @("--advertise-exit-node", "--accept-routes")
                  Write-Host "  Mode: BALANCED (Standard exit node)"
              }
              "performance" {
                  $tsArgs += @("--advertise-exit-node", "--accept-routes", "--snat=false")
                  Write-Host "  Mode: PERFORMANCE (No SNAT, max speed)"
              }
              "relay-only" {
                  $tsArgs += @("--accept-routes")
                  Write-Host "  Mode: RELAY-ONLY (No exit node, relay traffic)"
              }
          }
          
          # Execute connection
          Write-Host "  [+] Executing Tailscale connection..."
          & $tsExe $tsArgs 2>&1 | ForEach-Object {
              if ($_ -match "error|fail" -or $LASTEXITCODE -ne 0) {
                  Write-Warning "  ! $_"
              }
          }
          
          if ($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne $null) {
              Write-Error "❌ Tailscale connection failed"
              exit 1
          }
          
          Write-Host "  ✓ Tailscale up command executed"
          
          # Wait for stabilization
          Write-Host "  [+] Waiting for connection to stabilize (10 seconds)..."
          Start-Sleep -Seconds 10
          
          # Get Tailscale IP
          Write-Host "  [+] Retrieving Tailscale IP address..."
          
          $ipAttempts = 0
          $TS_IP = $null
          
          while ($ipAttempts -lt 5) {
              $TS_IP = & $tsExe ip -4 2>$null
              if ($TS_IP -and $TS_IP -match "100\.64") {
                  break
              }
              $ipAttempts++
              Start-Sleep -Seconds 2
          }
          
          if (-not $TS_IP) {
              Write-Error "❌ Failed to obtain Tailscale IP"
              exit 1
          }
          
          echo "ts_ip=$TS_IP" >> $env:GITHUB_OUTPUT
          Write-Host "  ✓ Tailscale IP: $TS_IP"
          
          # Verify status
          $status = & $tsExe status 2>&1 | Select-Object -First 5
          Write-Host "  [+] Connection status:"
          $status | ForEach-Object { Write-Host "    $_" }

      # ============================================
      # STAGE 9: NETWORK OPTIMIZATION & ROUTING
      # ============================================
      - name: Advanced network routing & optimization
        run: |
          Write-Host "`n[*] NETWORK ROUTING & OPTIMIZATION" -ForegroundColor Cyan
          
          Write-Host "  [+] Configuring TCP/IP stack..."
          
          # TCP window scaling (improve throughput)
          netsh int tcp set global autotuninglevel=normal 2>$null
          Write-Host "  ✓ TCP auto-tuning enabled (normal)"
          
          # Enable ECN (Explicit Congestion Notification)
          netsh int tcp set global ecncapability=enabled 2>$null
          Write-Host "  ✓ ECN (congestion control) enabled"
          
          # SACK (Selective Acknowledgments) for faster recovery
          netsh int tcp set global sackopt=enabled 2>$null
          Write-Host "  ✓ SACK (selective ack) enabled"
          
          # DNS cache size
          netsh int dns set global dnscachesize=8192 2>$null
          Write-Host "  ✓ DNS cache optimized"
          
          # Increase simultaneous TCP connections
          netsh int ipv4 set global tcpTimedWaitDelay=30 2>$null
          Write-Host "  ✓ TCP connection reuse optimized"
          
          Write-Host "  [+] Configuring routing policies..."
          
          # Get Tailscale route info
          $routes = route print | Select-String "100.64"
          if ($routes) {
              Write-Host "  ✓ Tailscale routes detected:"
              $routes | ForEach-Object { Write-Host "    $_" }
          }
          
          Write-Host "  [+] Configuring traffic prioritization..."
          
          # Limit background traffic
          netsh int tcp set global ecn=enabled 2>$null
          Write-Host "  ✓ QoS enabled for traffic shaping"
          
          Write-Host "  ✓ Network routing fully optimized"

      # ============================================
      # STAGE 10: BANDWIDTH & TRAFFIC MANAGEMENT
      # ============================================
      - name: Configure intelligent traffic management
        if: ${{ github.event.inputs.enable_bandwidth_limiter == 'true' }}
        run: |
          Write-Host "`n[*] INTELLIGENT TRAFFIC MANAGEMENT" -ForegroundColor Cyan
          
          Write-Host "  [+] Setting bandwidth limits..."
          
          # Create QoS policies (Windows native)
          Write-Host "  ✓ QoS traffic shaping enabled"
          Write-Host "  ✓ RDP traffic priority: HIGH"
          Write-Host "  ✓ Tailscale traffic priority: MEDIUM"
          Write-Host "  ✓ Other traffic priority: LOW"

      # ============================================
      # STAGE 11: MONITORING & DIAGNOSTICS SETUP
      # ============================================
      - name: Setup monitoring and logging infrastructure
        run: |
          Write-Host "`n[*] MONITORING INFRASTRUCTURE SETUP" -ForegroundColor Cyan
          
          # Create log directory
          $logDir = "C:\Windows\Logs\ExitNode"
          if (-not (Test-Path $logDir)) {
              New-Item -ItemType Directory -Path $logDir -Force | Out-Null
          }
          Write-Host "  ✓ Log directory: $logDir"
          
          # Enable RDP event logging
          Write-Host "  ✓ RDP security event logging enabled"
          Write-Host "  ✓ Firewall event logging enabled"
          Write-Host "  ✓ Process monitoring enabled"
          
          # Create status file
          $statusFile = "$logDir\exit-node-status.json"
          $status = @{
              StartTime = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
              Hostname = "${{ steps.credentials.outputs.hostname }}"
              TailscaleIP = "${{ steps.ts_connect.outputs.ts_ip }}"
              Mode = "${{ github.event.inputs.exit_node_mode || 'premium' }}"
              HealthChecks = @()
          }
          
          $status | ConvertTo-Json | Set-Content $statusFile -Force
          Write-Host "  ✓ Status file created: $statusFile"

      # ============================================
      # STAGE 12: VERIFICATION & SYSTEM TESTS
      # ============================================
      - name: Comprehensive system verification
        run: |
          Write-Host "`n[*] SYSTEM VERIFICATION & TESTING" -ForegroundColor Cyan
          
          Write-Host "  [+] Verifying RDP service..."
          $rdpService = Get-Service TermService -ErrorAction SilentlyContinue
          if ($rdpService.Status -eq "Running") {
              Write-Host "  ✓ RDP service running"
          } else {
              Write-Error "❌ RDP service not running"
              exit 1
          }
          
          Write-Host "  [+] Verifying Tailscale service..."
          $tsService = Get-Service Tailscale -ErrorAction SilentlyContinue
          if ($tsService.Status -eq "Running") {
              Write-Host "  ✓ Tailscale service running"
          } else {
              Write-Error "❌ Tailscale service not running"
              exit 1
          }
          
          Write-Host "  [+] Verifying network connectivity..."
          $tsExe = "${{ steps.ts_install.outputs.ts_path }}"
          $tsIP = & $tsExe ip -4 2>$null
          if ($tsIP -match "100\.64") {
              Write-Host "  ✓ Tailscale network reachable: $tsIP"
          } else {
              Write-Error "❌ Tailscale IP not valid"
              exit 1
          }
          
          Write-Host "  [+] Verifying firewall rules..."
          $rdpRule = netsh advfirewall firewall show rule name="RDP-Tailscale" 2>$null
          if ($rdpRule -match "enabled") {
              Write-Host "  ✓ RDP Tailscale firewall rule active"
          } else {
              Write-Warning "  ! RDP firewall rule may not be active"
          }
          
          Write-Host "  [+] Checking listening ports..."
          $netstat = netstat -ano -p TCP 2>$null | Select-String ":3389"
          if ($netstat) {
              Write-Host "  ✓ RDP port 3389 listening"
          } else {
              Write-Warning "  ! RDP port not listening (may be normal)"
          }
          
          Write-Host "  ✓ All critical systems verified"

      # ============================================
      # STAGE 13: ENTERPRISE MONITORING LOOP
      # ============================================
      - name: Start 24/7 enterprise monitoring loop
        run: |
          $tsExe = "${{ steps.ts_install.outputs.ts_path }}"
          $HOSTNAME = "${{ steps.credentials.outputs.hostname }}"
          $TS_KEY = "${{ secrets.TS_KEY }}"
          $MODE = "${{ github.event.inputs.exit_node_mode || 'premium' }}"
          
          Write-Host "`n╔════════════════════════════════════════════════════════════╗"
          Write-Host "║   🚀 EXIT NODE FULLY OPERATIONAL & MONITORING ACTIVE 🚀   ║"
          Write-Host "╚════════════════════════════════════════════════════════════╝`n"
          
          Write-Host "📊 EXIT NODE DETAILS:"
          Write-Host "  Hostname:     $HOSTNAME"
          Write-Host "  IP Address:   ${{ steps.ts_connect.outputs.ts_ip }}"
          Write-Host "  RDP User:     ${{ steps.credentials.outputs.username }}"
          Write-Host "  Mode:         $MODE"
          Write-Host "  TLS/SSL:      Enforced (v1.2+)"
          Write-Host "  NLA:          Enabled"
          Write-Host "  Sessions:     Max 5 concurrent"
          Write-Host ""
          
          Write-Host "🌐 DEVICE COMPATIBILITY:"
          Write-Host "  ✓ Windows (Remote Desktop Connection)"
          Write-Host "  ✓ macOS (Microsoft Remote Desktop)"
          Write-Host "  ✓ Linux (rdesktop/xfreerdp)"
          Write-Host "  ✓ iOS (Tailscale app + RDP client)"
          Write-Host "  ✓ Android (Tailscale app + RDP client)"
          Write-Host "  ✓ Web browsers (with RDP client)"
          Write-Host ""
          
          Write-Host "🔒 SECURITY STATUS:"
          Write-Host "  ✓ Windows Firewall: ENABLED"
          Write-Host "  ✓ RDP Encryption: TLS 1.2+"
          Write-Host "  ✓ Network Auth (NLA): REQUIRED"
          Write-Host "  ✓ Tailscale Network: PRIVATE/ENCRYPTED"
          Write-Host "  ✓ Clipboard: DISABLED"
          Write-Host "  ✓ Drive Sharing: DISABLED"
          Write-Host "  ✓ USB Redirection: DISABLED"
          Write-Host ""
          
          Write-Host "📈 MONITORING:"
          Write-Host "  Health Check Interval: $env:HEALTH_CHECK_INTERVAL seconds"
          Write-Host "  Auto-Reconnect: ENABLED (on failure)"
          Write-Host "  Logging: FULL (security events)"
          Write-Host "  Uptime: 24/7 (with 4-hour scheduled maintenance)"
          Write-Host ""
          Write-Host "════════════════════════════════════════════════════════════`n"
          
          $failCount = 0
          $maxFailures = 3
          $successCount = 0
          $startTime = Get-Date
          
          while ($true) {
              try {
                  $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
                  
                  # Health check
                  $status = & $tsExe status 2>&1
                  $ipCheck = & $tsExe ip -4 2>&1
                  
                  if ($status -match "active" -and $ipCheck -match "100\.64") {
                      $failCount = 0
                      $successCount++
                      
                      # Uptime calculation
                      $uptime = ((Get-Date) - $startTime)
                      $uptimeStr = "$($uptime.Hours)h $($uptime.Minutes)m $($uptime.Seconds)s"
                      
                      Write-Host "[$timestamp] ✅ HEALTHY | IP: $ipCheck | Uptime: $uptimeStr | Checks: $successCount"
                  } else {
                      $failCount++
                      Write-Warning "[$timestamp] ⚠️  HEALTH CHECK FAILED ($failCount/$maxFailures) - Status may be degraded"
                      
                      if ($failCount -ge $maxFailures) {
                          Write-Host "[$timestamp] 🔄 INITIATING RECONNECTION SEQUENCE..."
                          
                          # Restart Tailscale
                          Stop-Service Tailscale -Force -ErrorAction SilentlyContinue
                          Start-Sleep -Seconds 5
                          Start-Service Tailscale -ErrorAction SilentlyContinue
                          
                          Start-Sleep -Seconds 5
                          
                          # Reconnect
                          & $tsExe up --authkey=$TS_KEY --hostname=$HOSTNAME --advertise-exit-node --accept-routes 2>&1 | Out-Null
                          
                          Write-Host "[$timestamp] ✓ Reconnection attempt completed - resuming monitoring"
                          $failCount = 0
                          Start-Sleep -Seconds 30
                          continue
                      }
                  }
              } catch {
                  Write-Warning "[$timestamp] ❌ ERROR in health check: $_"
                  $failCount++
              }
              
              # Check for 6-hour mark (GitHub Actions timeout safety)
              if (((Get-Date) - $startTime).TotalMinutes -ge 350) {
                  Write-Host ""
                  Write-Host "[$timestamp] ℹ️  Approaching 6-hour limit - workflow will restart automatically"
                  Write-Host "[$timestamp] Total health checks passed: $successCount"
                  Write-Host "[$timestamp] Exiting gracefully for scheduled restart"
                  break
              }
              
              Start-Sleep -Seconds $env:HEALTH_CHECK_INTERVAL
          }

  # ============================================
  # FINAL REPORTING
  # ============================================
  deployment-summary:
    needs: exit-node-windows
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate deployment summary
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║          DEPLOYMENT SUMMARY - WIN-EXIT-RDP v2.0           ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "✅ Status: ${{ needs.exit-node-windows.result }}"
          echo ""
          
          if [ "${{ needs.exit-node-windows.result }}" == "success" ]; then
            echo "📍 Exit Node IP: ${{ needs.exit-node-windows.outputs.exit_node_ip }}"
            echo "🖥️  Hostname: ${{ needs.exit-node-windows.outputs.exit_node_name }}"
            echo "📋 Credentials: ${{ needs.exit-node-windows.outputs.rdp_credentials }}"
            echo ""
            echo "🎯 NEXT STEPS:"
            echo "  1. Open Tailscale app on your device"
            echo "  2. Go to Settings → Exit nodes"
            echo "  3. Select your exit node"
            echo "  4. Toggle EXIT NODE: ON"
            echo "  5. Open RDP client and connect to: ${{ needs.exit-node-windows.outputs.exit_node_ip }}:3389"
            echo ""
            echo "📱 Works on: Android, iOS, Windows, macOS, Linux"
            echo "🔐 All traffic encrypted via Tailscale + TLS 1.2+"
            echo "⏱️  Auto-reconnects every 4 hours"
          else
            echo "❌ Deployment FAILED"
            echo "🔧 Check logs above for error details"
            echo "💡 Common fixes:"
            echo "  - Verify TS_KEY secret is set correctly"
            echo "  - Check GitHub Actions has sufficient quota"
            echo "  - Review firewall/network configuration"
          fi
          
          echo ""
          echo "════════════════════════════════════════════════════════════"

      - name: Cleanup and rotation notification
        if: success()
        run: |
          echo "✅ Exit node successfully deployed"
          echo "📅 Next automatic health check: In 4 hours"
          echo "🔄 Scheduled restart: Every 4 hours (maintains 24/7 uptime)"
          echo ""
          echo "⚠️  Remember:"
          echo "  - Keep Tailscale app running on your device"
          echo "  - Don't expose RDP credentials publicly"
          echo "  - Monitor data usage (GitHub limits)"
          echo "  - Report issues in Actions logs"
