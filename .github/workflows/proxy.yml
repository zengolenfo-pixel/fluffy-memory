name: Ubuntu XFCE RDP (24/7 Engine)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  rdp-session:
    runs-on: ubuntu-latest
    timeout-minutes: 52560 # 36.5 days
    
    steps:
      - name: 1. Set Credentials
        id: creds
        run: |
          echo "username=adminuser" >> "$GITHUB_OUTPUT"
          echo "password=$(tr -dc 'A-Za-z0-9!@#%^&*' < /dev/urandom | head -c 12)" >> "$GITHUB_OUTPUT"
          echo "hostname=u$(tr -dc 'a-z0-9' < /dev/urandom | head -c12)" >> "$GITHUB_OUTPUT"

      - name: 2. Set Hostname
        run: |
          sudo hostnamectl set-hostname "${{ steps.creds.outputs.hostname }}"
          echo "127.0.1.1 ${{ steps.creds.outputs.hostname }}" | sudo tee -a /etc/hosts

      - name: 3. Install XFCE Desktop & XRDP
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq --no-install-recommends xfce4 xfce4-goodies xrdp xorgxrdp dbus-x11 sudo bash
          sudo apt-get clean -qq

      - name: 4. Configure XRDP
        run: |
          sudo tee /etc/xrdp/startwm.sh > /dev/null << 'EOF'
          #!/bin/sh
          export XDG_SESSION_DESKTOP=xfce
          export XDG_CURRENT_DESKTOP=XFCE
          export DESKTOP_SESSION=xfce
          exec startxfce4
          EOF
          
          sudo chmod 755 /etc/xrdp/startwm.sh
          sudo sed -i 's/max_bpp=32/max_bpp=24/g' /etc/xrdp/xrdp.ini
          sudo adduser xrdp ssl-cert

      - name: 5. Create RDP User
        run: |
          sudo useradd -m -s /bin/bash -G sudo "${{ steps.creds.outputs.username }}"
          echo "${{ steps.creds.outputs.username }}:${{ steps.creds.outputs.password }}" | sudo chpasswd
          echo "xfce4-session" | sudo tee /home/${{ steps.creds.outputs.username }}/.xsession
          sudo chown ${{ steps.creds.outputs.username }}:${{ steps.creds.outputs.username }} /home/${{ steps.creds.outputs.username }}/.xsession

      - name: 6. Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key="${{ secrets.TS_AUTH_KEY }}" --hostname="${{ steps.creds.outputs.hostname }}" --advertise-exit-node --accept-routes --accept-dns=false
          echo "tailscale-ip=$(tailscale ip -4)" >> "$GITHUB_OUTPUT"
        id: tailscale

      - name: 7. Launch 24/7 Engine
        run: |
          HOSTNAME="${{ steps.creds.outputs.hostname }}"
          TS_IP="${{ steps.tailscale.outputs.tailscale-ip }}"

          echo "═══════════════════════════════════════════"
          echo "  Ubuntu XFCE RDP RUNNING"
          echo "═══════════════════════════════════════════"
          echo "  Tailscale: $TS_IP"
          echo "  Username:  ${{ steps.creds.outputs.username }}"
          echo "  Password:  ${{ steps.creds.outputs.password }}"
          echo "  Port:      3389"
          echo "═══════════════════════════════════════════"

          # Start services initially
          sudo systemctl restart xrdp
          
          export RUNNER_TRACKING_ID=0

          # Daemon: Health monitor running in background
          nohup setsid bash -c "
            export RUNNER_TRACKING_ID=0
            exec 0</dev/null
            exec 1>/dev/null
            exec 2>/dev/null
            while true; do
              # Keep XRDP alive
              if ! systemctl is-active --quiet xrdp; then
                sudo systemctl restart xrdp
              fi
              # Keep Tailscale connected
              tailscale status 2>/dev/null | grep -q '$TS_IP' || sudo tailscale up --auth-key='\${{ secrets.TS_AUTH_KEY }}' --hostname='$HOSTNAME' --advertise-exit-node --accept-routes --accept-dns=false 2>/dev/null
              sleep 60
            done
          " > /dev/null 2>&1 &

      - name: 8. Keep alive loop
        run: |
          echo "Ubuntu RDP running for 35-day max timeout."
          END=$((SECONDS + 52560 * 60))
          while [ $SECONDS -lt $END ]; do
            UPTIME=$((SECONDS / 3600))
            echo "Uptime: ${UPTIME}h - XRDP & Tailscale Active - $(date)"
            sleep 3600
          done
