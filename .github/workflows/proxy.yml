name: WIN-EXIT-NODE-SMOOTH

on:
  workflow_dispatch:
    inputs:
      exit_node_mode:
        description: 'Exit node mode'
        required: true
        default: 'performance'
        type: choice
        options:
          - performance
          - relay-only

  schedule:
    - cron: '5 */4 * * *'

env:
  TS_PORT: "41641"
  HEALTH_CHECK_INTERVAL: "180"

concurrency:
  group: exit-node-windows
  cancel-in-progress: false

jobs:
  windows-exit-node:
    runs-on: windows-latest
    timeout-minutes: 360

    outputs:
      exit_node_ip: ${{ steps.ts_connect.outputs.ts_ip }}

    steps:
      - name: System information
        run: |
          Write-Host "=============================="
          Write-Host "Windows Exit Node – Smooth v1.0"
          Write-Host "=============================="
          Write-Host "OS: $((Get-CimInstance Win32_OperatingSystem).Caption)"
          Write-Host "CPU: $((Get-CimInstance Win32_Processor).Name)"
          Write-Host "RAM: $([math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory/1GB,2)) GB"

      - name: Install Tailscale
        run: |
          Write-Host "[*] Installing Tailscale..."
          choco install tailscale -y --no-progress

          # Tailscale MSI installs to this fixed path
          $defaultPath = "C:\Program Files\Tailscale\tailscale.exe"
          if (Test-Path $defaultPath) {
            Write-Host "Tailscale found at: $defaultPath"
          } else {
            # Fallback search in case of rare changes
            $found = Get-ChildItem -Path "C:\Program Files" -Recurse -Filter tailscale.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              Write-Host "Tailscale found at: $($found.FullName)"
            } else {
              Write-Host "ERROR: tailscale.exe not found after installation"
              exit 1
            }
          }
          Write-Host "Tailscale version:"
          & "C:\Program Files\Tailscale\tailscale.exe" version

      - name: Connect to Tailscale
        id: ts_connect
        run: |
          # Hardcoded default path + fallback
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          if (-not (Test-Path $tsExe)) {
            $tsExe = (Get-ChildItem -Path "C:\Program Files" -Recurse -Filter tailscale.exe -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          if (-not $tsExe) {
            Write-Host "ERROR: Cannot locate tailscale.exe"
            exit 1
          }
          Write-Host "[*] Connecting to Tailscale using $tsExe"

          # Random hostname
          $hostname = "win-" + (-join ((65..90) + (97..122) | Get-Random -Count 6 | ForEach-Object {[char]$_}))

          $mode = "${{ github.event.inputs.exit_node_mode || 'performance' }}"
          $args = "--accept-routes --accept-dns=true"
          if ($mode -eq "performance") {
            $args += " --advertise-exit-node"
          }

          & $tsExe up --authkey="${{ secrets.TS_KEY }}" --hostname=$hostname $args

          Start-Sleep -Seconds 20

          # Retrieve IP
          $ip = $null
          for ($i=0; $i -lt 15; $i++) {
            $ip = (& $tsExe ip -4 2>&1 | Select-Object -First 1).Trim()
            if ($ip -match "^100\.") { break }
            Start-Sleep -Seconds 5
          }

          if (-not $ip -or $ip -notmatch "^100\.") {
            Write-Host "ERROR: Could not obtain Tailscale IP"
            & $tsExe status
            exit 1
          }

          Write-Host "Exit node IP: $ip"
          Write-Output "ts_ip=$ip" >> $env:GITHUB_OUTPUT

      - name: 24/7 Monitor & Auto-Recovery
        run: |
          # Locate tailscale.exe (same logic)
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          if (-not (Test-Path $tsExe)) {
            $tsExe = (Get-ChildItem -Path "C:\Program Files" -Recurse -Filter tailscale.exe -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          if (-not $tsExe) {
            Write-Host "ERROR: Cannot locate tailscale.exe"
            exit 1
          }

          $ip = "${{ steps.ts_connect.outputs.ts_ip }}"
          $hostname = "win-" + (-join ((65..90) + (97..122) | Get-Random -Count 6 | ForEach-Object {[char]$_}))
          $failCount = 0
          $healthCount = 0
          $startTime = Get-Date

          Write-Host "╔══════════════════════════════════════╗"
          Write-Host "║   EXIT NODE LIVE – WINDOWS SMOOTH   ║"
          Write-Host "╚══════════════════════════════════════╝"
          Write-Host "Hostname: $hostname"
          Write-Host "IP: $ip"
          Write-Host ""

          while ($true) {
            $elapsed = (Get-Date) - $startTime
            $uptime = "{0}h {1:D2}m" -f [math]::Floor($elapsed.TotalHours), $elapsed.Minutes
            $timestamp = Get-Date -Format "HH:mm:ss"

            $online = $false
            $statusOut = & $tsExe status 2>&1 | Out-String

            if ($statusOut -match $ip -and $statusOut -notmatch "offline") {
              $online = $true
            }

            if ($online) {
              $failCount = 0
              $healthCount++
              Write-Host "[$timestamp] ✅ ONLINE | $ip | Uptime: $uptime | Checks: $healthCount"
            }
            else {
              $failCount++
              Write-Host "[$timestamp] ❌ OFFLINE ($failCount/3)"
              if ($failCount -ge 3) {
                Write-Host "[$timestamp] 🔄 Reconnecting..."
                & $tsExe up --authkey="${{ secrets.TS_KEY }}" --hostname=$hostname --advertise-exit-node --accept-routes --accept-dns=true
                $failCount = 0
                Start-Sleep -Seconds 15
              }
            }

            # Graceful exit before 6‑hour timeout (350 minutes)
            if ($elapsed.TotalSeconds -ge 21000) {
              Write-Host "╔══════════════════════════════════════╗"
              Write-Host "║   TIMEOUT – GRACEFUL SHUTDOWN       ║"
              Write-Host "╚══════════════════════════════════════╝"
              Write-Host "Uptime: $uptime | Health checks: $healthCount"
              break
            }

            Start-Sleep -Seconds ${{ env.HEALTH_CHECK_INTERVAL }}
          }

  summary:
    needs: windows-exit-node
    if: always()
    runs-on: windows-latest
    steps:
      - run: |
          if ("${{ needs.windows-exit-node.result }}" -eq "success") {
            Write-Host "✅ EXIT NODE DEPLOYED (Windows)"
            Write-Host "IP: ${{ needs.windows-exit-node.outputs.exit_node_ip }}"
          } else {
            Write-Host "❌ DEPLOYMENT FAILED"
          }
