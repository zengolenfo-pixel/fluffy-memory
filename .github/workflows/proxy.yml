name: macOS RDP

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 52560
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate credentials
        id: creds
        run: |
          echo "username=u$(tr -dc 'a-z0-9' < /dev/urandom | head -c9)" >> "$GITHUB_OUTPUT"
          echo "password=$(tr -dc 'A-Za-z0-9!@#%^&*' < /dev/urandom | head -c16)" >> "$GITHUB_OUTPUT"
          echo "hostname=n$(tr -dc 'a-z0-9' < /dev/urandom | head -c12)" >> "$GITHUB_OUTPUT"

      - name: Random jitter
        run: |
          JITTER=$((30 + RANDOM % 270))
          echo "Sleeping ${JITTER}s..."
          sleep "$JITTER"

      - name: Set hostname
        run: |
          sudo hostnamectl set-hostname "${{ steps.creds.outputs.hostname }}"
          echo "127.0.1.1 ${{ steps.creds.outputs.hostname }}" | sudo tee -a /etc/hosts

      - name: Install xrdp + GNOME
        run: |
          echo "tzdata tzdata/Areas select Etc" | sudo debconf-set-selections
          echo "tzdata tzdata/Zones/Etc select UTC" | sudo debconf-set-selections
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ubuntu-desktop-minimal \
            xrdp xorgxrdp dbus-x11 \
            gnome-terminal nautilus firefox \
            gnome-tweaks gnome-shell-extensions \
            policykit-1 \
            --no-install-recommends
          sudo apt-get autoremove -y -qq
          sudo apt-get clean -qq

      - name: Fix black screen + configure xrdp
        run: |
          sudo cp /etc/xrdp/startwm.sh /etc/xrdp/startwm.sh.bak
          sudo tee /etc/xrdp/startwm.sh > /dev/null << 'XRDPEOF'
          #!/bin/sh
          if [ -r /etc/default/locale ]; then
            . /etc/default/locale
            export LANG LANGUAGE
          fi
          if [ -z "$DBUS_SESSION_BUS_ADDRESS" ]; then
            export $(dbus-launch)
          fi
          export XDG_SESSION_TYPE=x11
          export XDG_CURRENT_DESKTOP=ubuntu:GNOME
          export GNOME_SHELL_SESSION_MODE=ubuntu
          export DESKTOP_SESSION=ubuntu
          gnome-session --session=ubuntu
          XRDPEOF
          sudo chmod 755 /etc/xrdp/startwm.sh
          echo "export GNOME_SHELL_SESSION_MODE=ubuntu" > ~/.xsessionrc
          echo "export XDG_CURRENT_DESKTOP=ubuntu:GNOME" >> ~/.xsessionrc
          echo "export XDG_SESSION_TYPE=x11" >> ~/.xsessionrc
          sudo sed -i 's/#WaylandEnable=false/WaylandEnable=false/' /etc/gdm3/custom.conf 2>/dev/null || true
          echo "WaylandEnable=false" | sudo tee -a /etc/gdm3/custom.conf 2>/dev/null || true

      - name: Polkit fix
        run: |
          sudo tee /etc/polkit-1/localauthority.conf.d/02-allow-all.conf > /dev/null << 'POLKIT'
          polkit.addRule(function(action, subject) { return polkit.Result.YES; });
          POLKIT

      - name: Tune xrdp
        run: |
          sudo sed -i 's/max_bpp=.*/max_bpp=32/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/xserverbpp=.*/xserverbpp=24/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/encrypt_level=.*/encrypt_level=high/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/use_vsock=.*/use_vsock=false/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/#bitmap_cache=yes/bitmap_cache=yes/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/#bitmap_compression=yes/bitmap_compression=yes/' /etc/xrdp/xrdp.ini

      - name: Create user
        run: |
          sudo useradd -m -G sudo -s /bin/bash "${{ steps.creds.outputs.username }}"
          echo "${{ steps.creds.outputs.username }}:${{ steps.creds.outputs.password }}" | sudo chpasswd
          echo "${{ steps.creds.outputs.username }} ALL=(ALL) NOPASSWD:ALL" | sudo tee "/etc/sudoers.d/${{ steps.creds.outputs.username }}"

      - name: macOS experience
        run: |
          U="${{ steps.creds.outputs.username }}"
          sudo -u "$U" dbus-launch gsettings set org.gnome.desktop.wm.preferences button-layout 'close,minimize,maximize:'
          sudo -u "$U" dbus-launch gsettings set org.gnome.shell.extensions.dash-to-dock dock-position 'BOTTOM'
          sudo -u "$U" dbus-launch gsettings set org.gnome.shell.extensions.dash-to-dock autohide false
          sudo -u "$U" dbus-launch gsettings set org.gnome.shell.extensions.dash-to-dock intellihide false
          sudo -u "$U" dbus-launch gsettings set org.gnome.shell.extensions.dash-to-dock show-trash false
          sudo -u "$U" dbus-launch gsettings set org.gnome.shell.extensions.dash-to-dock dash-max-icon-size 48
          sudo -u "$U" dbus-launch gsettings set org.gnome.shell.extensions.dash-to-dock extend-height false
          sudo -u "$U" dbus-launch gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
          sudo -u "$U" dbus-launch gsettings set org.gnome.shell.ubuntu color-scheme 'dark'
          sudo -u "$U" dbus-launch gsettings set org.gnome.desktop.screensaver lock-enabled false
          sudo -u "$U" dbus-launch gsettings set org.gnome.desktop.screensaver idle-activation-enabled false
          sudo -u "$U" dbus-launch gsettings set org.gnome.desktop.session idle-delay 0
          sudo -u "$U" dbus-launch gsettings set org.gnome.desktop.interface enable-animations false
          sudo -u "$U" dbus-launch gsettings set org.gnome.desktop.background picture-uri ''
          sudo -u "$U" dbus-launch gsettings set org.gnome.desktop.background primary-color '#000000'
          sudo -u "$U" dbus-launch gsettings set org.gnome.desktop.interface clock-show-date true
          sudo -u "$U" dbus-launch gsettings set org.gnome.desktop.interface clock-show-weekday true
          echo "export GNOME_SHELL_SESSION_MODE=ubuntu" > "/home/$U/.xsessionrc"
          echo "export XDG_CURRENT_DESKTOP=ubuntu:GNOME" >> "/home/$U/.xsessionrc"
          echo "export XDG_SESSION_TYPE=x11" >> "/home/$U/.xsessionrc"
          chown "$U:$U" "/home/$U/.xsessionrc"

      - name: Restart xrdp
        run: |
          sudo systemctl daemon-reload
          sudo systemctl restart xrdp || true
          sudo systemctl restart xrdp-sesman || true
          sleep 3

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key="${{ secrets.TS_AUTH_KEY }}" --hostname="${{ steps.creds.outputs.hostname }}" --accept-routes --accept-dns=false
          echo "tailscale-ip=$(tailscale ip -4)" >> "$GITHUB_OUTPUT"
        id: tailscale

      - name: 24/7 Engine
        run: |
          USERNAME="${{ steps.creds.outputs.username }}"
          PASSWORD="${{ steps.creds.outputs.password }}"
          HOSTNAME="${{ steps.creds.outputs.hostname }}"
          TS_IP="${{ steps.tailscale.outputs.tailscale-ip }}"

          echo "═══════════════════════════════════════════"
          echo "  🍎 macOS RDP RUNNING"
          echo "═══════════════════════════════════════════"
          echo "  Tailscale: $TS_IP"
          echo "  Username:  $USERNAME"
          echo "  Password:  $PASSWORD"
          echo "  Port:      3389"
          echo "═══════════════════════════════════════════"
          echo "  RDP → $TS_IP:3389"
          echo ""

          export RUNNER_TRACKING_ID=0

          nohup bash -c "
            export RUNNER_TRACKING_ID=0
            while true; do
              pgrep -x xrdp > /dev/null 2>&1 || sudo systemctl restart xrdp 2>/dev/null
              pgrep -x xrdp-sesman > /dev/null 2>&1 || sudo systemctl restart xrdp-sesman 2>/dev/null
              tailscale status 2>/dev/null | grep -q \"$TS_IP\" || sudo tailscale up --auth-key=\"\${{ secrets.TS_AUTH_KEY }}\" --hostname=\"$HOSTNAME\" --accept-routes --accept-dns=false 2>/dev/null
              sleep 60
            done
          " > /dev/null 2>&1 &

          setsid bash -c "
            export RUNNER_TRACKING_ID=0
            while true; do
              sudo -u \"$USERNAME\" dbus-launch true 2>/dev/null || true
              sleep 120
            done
          " < /dev/null > /dev/null 2>&1 &

          END=\$((SECONDS + 52560 * 60))
          while [ \$SECONDS -lt \$END ]; do
            UPTIME=\$((SECONDS / 3600))
            echo \"[♥] \${UPTIME}h | ts: \$(tailscale ip -4 2>/dev/null)\"
            sleep 60
          done
