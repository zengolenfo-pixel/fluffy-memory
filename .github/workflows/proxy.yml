name: STEALTH-RDP

on:
  workflow_dispatch:
  schedule:
    # Every 5 minutes with a 1‑minute random offset (via script at start)
    - cron: '*/5 * * * *'

env:
  TS_PORT: 41641

concurrency:
  group: rdp-stealth
  cancel-in-progress: false   # queue, don't cancel running sessions

jobs:
  stealth-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    outputs:
      ts_ip:    ${{ steps.ts_connect.outputs.ts_ip }}
      rdp_user: ${{ steps.create_user.outputs.rdp_user }}
      rdp_pass: ${{ steps.create_user.outputs.rdp_pass }}

    steps:
      # ──────────────────────────  1. Random delay to avoid patterns  ──────────────────────────
      - name: Random Jitter (0‑120 seconds)
        run: |
          $delay = Get-Random -Minimum 0 -Maximum 120
          Write-Host "Sleeping $delay sec..."
          Start-Sleep -Seconds $delay

      # ──────────────────────────  2. System Info  ──────────────────────────
      - name: System Info
        run: |
          $os  = Get-CimInstance Win32_OperatingSystem
          $cpu = Get-CimInstance Win32_Processor | Select-Object -First 1
          $mem = Get-CimInstance Win32_ComputerSystem
          Write-Host "OS:   $($os.Caption) ($($os.Version))"
          Write-Host "CPU:  $($cpu.Name)"
          Write-Host "RAM:  $([math]::Round($mem.TotalPhysicalMemory/1GB,2)) GB"
          Write-Host "Host: $env:COMPUTERNAME"

      # ──────────────────────────  3. Enable RDP (all security off for convenience)  ────────
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name KeepAliveEnable    -Value 1
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name KeepAliveInterval  -Value 1
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name UserAuthentication -Value 0
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name SecurityLayer       -Value 0
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name MinEncryptionLevel   -Value 1

      # ──────────────────────────  4. Create RDP user (strong random password)  ────────────
      - name: Create RDP User
        id: create_user
        run: |
          $upper   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.ToCharArray()
          $lower   = 'abcdefghijklmnopqrstuvwxyz'.ToCharArray()
          $digits  = '0123456789'.ToCharArray()
          $special = '!@#$%^&*()-_=+'.ToCharArray()
          $all     = $upper + $lower + $digits + $special
          $chars   = @()
          $chars  += ($upper   | Get-Random -Count 3)
          $chars  += ($lower   | Get-Random -Count 3)
          $chars  += ($digits  | Get-Random -Count 3)
          $chars  += ($special | Get-Random -Count 3)
          $chars  += ($all     | Get-Random -Count 4)
          $pass    = ($chars | Sort-Object { Get-Random }) -join ''
          $user    = "rdpuser"
          try { Remove-LocalUser -Name $user -ErrorAction SilentlyContinue } catch {}
          New-LocalUser -Name $user -Password (ConvertTo-SecureString -AsPlainText $pass -Force) -FullName "RDP User" -PasswordNeverExpires
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user
          Add-LocalGroupMember -Group "Administrators"       -Member $user
          "$pass" | Out-File "$env:TEMP\rdp_pass.txt"
          Write-Host "USER: $user  PASS: $pass"
          "rdp_user=$user" | Out-File $env:GITHUB_OUTPUT -Append
          "rdp_pass=$pass" | Out-File $env:GITHUB_OUTPUT -Append

      # ──────────────────────────  5. Install Tailscale (silent)  ─────────────────────────
      - name: Install Tailscale
        id: ts_install
        run: |
          choco install tailscale -y --no-progress --limit-output
          $exe = (Get-ChildItem "C:\Program Files\Tailscale" -Filter tailscale.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $exe) { $exe = "C:\Program Files\Tailscale\tailscale.exe" }
          "ts_exe=$exe" | Out-File $env:GITHUB_OUTPUT -Append
          & $exe version

      # ──────────────────────────  6. Connect as exit node (random hostname)  ─────────────
      - name: Connect Tailscale Exit Node
        id: ts_connect
        run: |
          $exe      = "${{ steps.ts_install.outputs.ts_exe }}"
          $hostname = "rdp-" + (-join ((65..90) + (97..122) | Get-Random -Count 8 | ForEach-Object { [char]$_ }))
          & $exe up --authkey="${{ secrets.TS_KEY }}" --hostname=$hostname --advertise-exit-node --accept-routes --accept-dns=true
          Start-Sleep -Seconds 20
          $ip = $null
          for ($i = 0; $i -lt 24; $i++) {
            $raw = & $exe ip -4 2>&1
            if ($raw -match "^100\.") { $ip = $raw.Trim(); break }
            Start-Sleep -Seconds 5
          }
          if (-not $ip) { $ip = "check-tailscale-status" }
          Write-Host "Tailscale IP: $ip"
          "ts_ip=$ip" | Out-File $env:GITHUB_OUTPUT -Append

      # ──────────────────────────  7. Performance tweaks  ─────────────────────────────────
      - name: Performance Tweaks
        run: |
          powercfg.exe /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          powercfg.exe /change monitor-timeout-ac 0
          powercfg.exe /change standby-timeout-ac 0
          powercfg.exe /change hibernate-timeout-ac 0
          powercfg /h off

          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" -Name VisualFXSetting -Value 2
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name ScreenSaveActive -Value 0
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name MenuShowDelay    -Value 0
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name WaitToKillAppTimeout   -Value 2000
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name HungAppTimeout         -Value 2000
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control" -Name WaitToKillServiceTimeout -Value 2000

          $animPath = "HKCU:\Control Panel\Desktop\WindowMetrics"
          New-Item -Path $animPath -Force | Out-Null
          Set-ItemProperty -Path $animPath -Name MinAnimate -Value 0

          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced" -Name TaskbarAnimations -Value 0
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced" -Name DisallowShaking   -Value 1
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced" -Name HideFileExt       -Value 0
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced" -Name Hidden            -Value 1
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name EnableTransparency    -Value 0
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name AppsUseLightTheme     -Value 0
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name SystemUsesLightTheme  -Value 0

          $services = @("WSearch","SysMain","WerSvc","wcncsvc","WpcMonSvc","XboxNetApiSvc","DiagTrack","dmwappushservice","MapsBroker","RetailDemo")
          foreach ($s in $services) {
            Stop-Service $s -Force -ErrorAction SilentlyContinue
            Set-Service  $s -StartupType Disabled -ErrorAction SilentlyContinue
          }
          sc.exe config wuauserv start= disabled
          Stop-Service wuauserv -Force -ErrorAction SilentlyContinue

      # ──────────────────────────  8. Network & RDP optimizations  ────────────────────────
      - name: Network & RDP Optimizations
        run: |
          $tcp = "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters"
          Set-ItemProperty -Path $tcp -Name TCPNoDelay          -Value 1    -Type DWord -Force
          Set-ItemProperty -Path $tcp -Name TcpAckFrequency     -Value 1    -Type DWord -Force
          Set-ItemProperty -Path $tcp -Name TcpWindowSize       -Value 65535 -Type DWord -Force
          Set-ItemProperty -Path $tcp -Name GlobalMaxTcpWindowSize -Value 65535 -Type DWord -Force
          Set-ItemProperty -Path $tcp -Name Tcp1323Opts         -Value 3    -Type DWord -Force
          Set-ItemProperty -Path $tcp -Name DefaultTTL          -Value 64   -Type DWord -Force

          netsh int tcp set global autotuninglevel=normal
          netsh int tcp set global chimney=disabled
          netsh int tcp set global ecncapability=disabled
          netsh int tcp set global timestamps=disabled
          netsh int tcp set global rss=enabled
          netsh int tcp set global fastopen=enabled

          $rdp = "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp"
          Set-ItemProperty -Path $rdp -Name fInheritCompression  -Value 0 -Type DWord -Force
          Set-ItemProperty -Path $rdp -Name fEnableRemoteFX      -Value 0 -Type DWord -Force
          Set-ItemProperty -Path $rdp -Name fDisableClip         -Value 0 -Type DWord -Force
          Set-ItemProperty -Path $rdp -Name fDisableAudioCapture -Value 0 -Type DWord -Force
          Set-ItemProperty -Path $rdp -Name ColorDepth           -Value 4 -Type DWord -Force
          Set-ItemProperty -Path $rdp -Name fAllowDesktopComposition -Value 1 -Type DWord -Force

          Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services" `
            -Name fEnableVirtualizedGraphics -Value 1 -Type DWord -Force

      # ──────────────────────────  9. Extra registry polish  ─────────────────────────────
      - name: Registry Polish
        run: |
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting" -Name Disabled -Value 1
          New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Search" -Force | Out-Null
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Search" -Name AllowCortana -Value 0
          Set-ItemProperty -Path "HKCU:\Control Panel\Accessibility\StickyKeys" -Name Flags -Value 506
          New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization" -Force | Out-Null
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization" -Name NoLockScreen -Value 1
          New-Item -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\NewStartPanel" -Force | Out-Null
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\NewStartPanel" -Name "{20D04FE0-3AEA-1069-A2D8-08002B30309D}" -Value 0
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer" -Name DisableEdgeDesktopShortcutCreation -Value 1
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management" -Name ClearPageFileAtShutdown -Value 0
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management" -Name LargeSystemCache       -Value 0
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl" -Name Win32PrioritySeparation -Value 38

      # ──────────────────────────  10. Install essential software  ──────────────────────
      - name: Install Software
        run: |
          $apps = @(
            "googlechrome","firefox","notepadplusplus","vscode","7zip",
            "putty","winscp","telegram","vlc","qbittorrent",
            "python","git","nodejs","sumatrapdf"
          )
          foreach ($app in $apps) {
            choco install $app -y --no-progress --limit-output 2>&1 | Out-Null
            Write-Host "Installed: $app"
          }

      # ──────────────────────────  11. Firewall rules for Tailscale  ────────────────────
      - name: Firewall Rules
        run: |
          $ts = Get-NetAdapter -Name "*Tailscale*" -ErrorAction SilentlyContinue
          if ($ts) {
            New-NetFirewallRule -DisplayName "Tailscale-In"  -Direction Inbound  -InterfaceAlias $ts.Name -Action Allow -ErrorAction SilentlyContinue
            New-NetFirewallRule -DisplayName "Tailscale-Out" -Direction Outbound -InterfaceAlias $ts.Name -Action Allow -ErrorAction SilentlyContinue
          }
          Set-NetFirewallRule -DisplayName "Remote Desktop" -Profile Any -Enabled True -ErrorAction SilentlyContinue

      # ──────────────────────────  12. Desktop shortcuts  ───────────────────────────────
      - name: Desktop Shortcuts
        run: |
          $sh   = New-Object -ComObject WScript.Shell
          $desk = [Environment]::GetFolderPath("Desktop")
          $links = @{
            "Chrome"     = "C:\Program Files\Google\Chrome\Application\chrome.exe"
            "Firefox"    = "C:\Program Files\Mozilla Firefox\firefox.exe"
            "Notepad++"  = "C:\Program Files\Notepad++\notepad++.exe"
            "VS Code"    = "C:\Program Files\Microsoft VS Code\Code.exe"
            "WinSCP"     = "C:\Program Files (x86)\WinSCP\WinSCP.exe"
            "PuTTY"      = "C:\Program Files\PuTTY\putty.exe"
          }
          foreach ($name in $links.Keys) {
            if (Test-Path $links[$name]) {
              $s = $sh.CreateShortcut("$desk\$name.lnk")
              $s.TargetPath = $links[$name]
              $s.Save()
            }
          }

      # ──────────────────────────  13. Restart Explorer to apply themes  ────────────────
      - name: Restart Explorer
        run: Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue

      # ──────────────────────────  14. Keep‑alive & print credentials  ──────────────────
      - name: Keep-Alive & Show Credentials
        run: |
          $ip   = "${{ steps.ts_connect.outputs.ts_ip }}"
          $user = "${{ steps.create_user.outputs.rdp_user }}"
          $pass = "${{ steps.create_user.outputs.rdp_pass }}"
          Write-Host "============================================================"
          Write-Host "  RDP SESSION READY"
          Write-Host "  Tailscale IP : $ip"
          Write-Host "  Username     : $user"
          Write-Host "  Password     : $pass"
          Write-Host "  Port         : 3389"
          Write-Host "  Max uptime   : 6 hours (will auto‑restart)"
          Write-Host "============================================================"
          $end = (Get-Date).AddMinutes(350)
          $heartbeat = (Get-Date).AddMinutes(15)
          while ((Get-Date) -lt $end) {
            if ((Get-Date) -ge $heartbeat) {
              Write-Host "[$(Get-Date -Format 'HH:mm')] alive — $ip"
              $heartbeat = (Get-Date).AddMinutes(15)
            }
            Start-Sleep -Seconds 30
          }
          Write-Host "Session ended gracefully."

  # ──────────────────────────  Summary (always runs)  ────────────────────────────────
  summary:
    needs: stealth-rdp
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Connection Summary
        run: |
          echo "=============================="
          echo "  Tailscale IP : ${{ needs.stealth-rdp.outputs.ts_ip }}"
          echo "  Username     : ${{ needs.stealth-rdp.outputs.rdp_user }}"
          echo "  Password     : ${{ needs.stealth-rdp.outputs.rdp_pass }}"
          echo "=============================="
