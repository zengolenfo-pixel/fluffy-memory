name: ultra-full-android-cloud-playstore-edition

on:
  workflow_dispatch:

env:
  AVD_NAME: ultraandroid
  API_LEVEL: "35"
  TARGET: google_apis_playstore
  ARCH: x86_64
  ANDROID_SERIAL: emulator-5554
  ADB_INSTALL_TIMEOUT: "60"

jobs:
  ultra-android:
    name: Ultra Android Cloud PlayStore
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            curl wget unzip zip jq git \
            net-tools iproute2 dnsutils \
            qemu-kvm qemu-utils cpu-checker \
            xvfb screen tmux htop nano \
            ca-certificates gnupg lsb-release

      - name: Enable KVM
        run: |
          sudo chmod 666 /dev/kvm
          ls -la /dev/kvm
          kvm-ok || true

      - name: System network optimization
        run: |
          sudo sysctl -w net.core.rmem_max=2500000 || true
          sudo sysctl -w net.core.wmem_max=2500000 || true
          sudo sysctl -w net.core.netdev_max_backlog=5000 || true
          sudo sysctl -w net.ipv4.tcp_rmem="4096 87380 2500000" || true
          sudo sysctl -w net.ipv4.tcp_wmem="4096 65536 2500000" || true
          sudo sysctl -w net.ipv4.tcp_fastopen=3 || true
          sudo sysctl -w net.ipv4.tcp_slow_start_after_idle=0 || true
          sudo sysctl -w net.ipv4.tcp_mtu_probing=1 || true
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install Android emulator packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "emulator" \
            "platforms;android-${API_LEVEL}" \
            "build-tools;35.0.0" \
            "system-images;android-${API_LEVEL};${TARGET};${ARCH}"

      - name: Create Play Store AVD
        run: |
          echo "no" | avdmanager create avd \
            --force \
            --name "${AVD_NAME}" \
            --package "system-images;android-${API_LEVEL};${TARGET};${ARCH}" \
            --device "pixel_6"

      - name: Configure emulator
        run: |
          CONFIG="$HOME/.android/avd/${AVD_NAME}.avd/config.ini"

          sed -i '/hw.ramSize/d' "$CONFIG" || true
          sed -i '/vm.heapSize/d' "$CONFIG" || true
          sed -i '/disk.dataPartition.size/d' "$CONFIG" || true
          sed -i '/hw.gpu.enabled/d' "$CONFIG" || true
          sed -i '/hw.gpu.mode/d' "$CONFIG" || true

          cat >> "$CONFIG" <<EOF
          hw.ramSize=4096
          vm.heapSize=512
          disk.dataPartition.size=8192M
          hw.gpu.enabled=yes
          hw.gpu.mode=swiftshader_indirect
          hw.keyboard=yes
          hw.audioInput=no
          hw.audioOutput=no
          showDeviceFrame=no
          fastboot.forceColdBoot=yes
          EOF

          cat "$CONFIG"

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up \
            --authkey="${{ secrets.TS_KEY }}" \
            --hostname=ultra-android-cloud \
            --accept-dns=false

          tailscale ip -4

      - name: Start Android emulator
        run: |
          nohup emulator \
            -avd "${AVD_NAME}" \
            -no-window \
            -gpu swiftshader_indirect \
            -memory 4096 \
            -cores 4 \
            -accel on \
            -netdelay none \
            -netspeed full \
            -no-snapshot \
            -noaudio \
            -no-boot-anim \
            -camera-back none \
            -camera-front none \
            -timezone Africa/Casablanca \
            > emulator.log 2>&1 &

      - name: Wait for Android boot
        run: |
          adb wait-for-device

          for i in {1..120}; do
            BOOT="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')"
            if [ "$BOOT" = "1" ]; then
              echo "Android boot completed"
              exit 0
            fi
            echo "Waiting for boot... $i"
            sleep 5
          done

          echo "Boot failed"
          tail -200 emulator.log || true
          exit 1

      - name: Android performance tweaks
        run: |
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          adb shell settings put global stay_on_while_plugged_in 3
          adb shell settings put system screen_off_timeout 2147483647
          adb shell settings put global wifi_scan_always_enabled 0 || true
          adb shell settings put global adaptive_battery_management_enabled 0 || true
          adb shell settings put global app_standby_enabled 0 || true
          adb shell settings put secure screensaver_enabled 0 || true
          adb shell wm size 1080x1920
          adb shell wm density 480

      - name: Verify Play Store and Google services
        run: |
          echo "Android version:"
          adb shell getprop ro.build.version.release

          echo "Model:"
          adb shell getprop ro.product.model

          echo "Checking Play Store:"
          adb shell pm list packages | grep "com.android.vending"

          echo "Checking Google Play Services:"
          adb shell pm list packages | grep "com.google.android.gms"

      - name: Enable ADB TCP
        run: |
          adb tcpip 5555
          sleep 3

      - name: Show connection info
        run: |
          IP="$(tailscale ip -4)"

          echo "=========================================="
          echo "ANDROID CLOUD IS ONLINE"
          echo "=========================================="
          echo "Tailscale IP: $IP"
          echo "ADB command:"
          echo "adb connect $IP:5555"
          echo "=========================================="

      - name: Keep alive
        run: |
          while true; do
            echo "=========================================="
            date
            adb devices || true
            adb shell getprop sys.boot_completed || true
            tailscale status || true
            free -h || true
            df -h || true
            echo "=========================================="
            sleep 300
          done
