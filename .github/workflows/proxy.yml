name: STEALTH-RDP-UBUNTU-247

on:
  workflow_dispatch:
  schedule:
    # Every 5 minutes — cron overlap ensures 24/7 coverage
    - cron: '*/5 * * * *'

env:
  TS_PORT: 41641
  DEBIAN_FRONTEND: noninteractive

concurrency:
  group: rdp-stealth-ubuntu
  # DO NOT cancel in-progress — this lets overlapping runs co-exist
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Disk Reaper — maximizes free space BEFORE main job
  # ─────────────────────────────────────────────────────────
  disk-reaper:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      space_freed: ${{ steps.reap.outputs.space_freed }}
    steps:
      - name: Nuke Unused Packages & Cache
        id: reap
        run: |
          BEFORE=$(df -h / | tail -1 | awk '{print $4}')

          echo "[*] Freeing disk space — before: $BEFORE"

          # Nuke Android SDK (biggest hog ~12GB)
          sudo rm -rf /usr/local/lib/android 2>/dev/null || true

          # Nuke .NET SDK (~4GB)
          sudo rm -rf /usr/share/dotnet 2>/dev/null || true

          # Nuke Haskell (~3GB)
          sudo rm -rf /opt/ghc /usr/local/.ghcup 2>/dev/null || true

          # Nuke CodeQL (~4GB)
          sudo rm -rf /opt/hostedtoolcache/CodeQL 2>/dev/null || true

          # Nuke Docker images (~5GB)
          sudo docker system prune -a -f 2>/dev/null || true

          # Nuke swap (~4GB)
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /mnt/swapfile 2>/dev/null || true

          # Nuke tool cache (~6GB)
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true

          # Nuke apt cache
          sudo apt-get clean -qq 2>/dev/null || true
          sudo rm -rf /var/cache/apt/archives/*.deb 2>/dev/null || true

          # Nuke pip / npm cache
          sudo rm -rf ~/.cache/pip ~/.npm ~/.cargo 2>/dev/null || true

          # Nuke snap cache
          sudo rm -rf /var/lib/snapd/cache/* 2>/dev/null || true

          # Nuke journal logs
          sudo journalctl --rotate --vacuum-time=1s 2>/dev/null || true

          # Create a large tmpfs on /mnt for extra workspace
          sudo mount -t tmpfs -o size=8G tmpfs /mnt 2>/dev/null || true

          AFTER=$(df -h / | tail -1 | awk '{print $4}')
          echo "[+] Freed space — after: $AFTER"
          echo "space_freed=$AFTER" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────
  # JOB 2: Main RDP Session (ultra-clean, max tweaks)
  # ─────────────────────────────────────────────────────────
  stealth-rdp:
    needs: disk-reaper
    runs-on: ubuntu-latest
    timeout-minutes: 360

    outputs:
      ts_ip:     ${{ steps.ts_connect.outputs.ts_ip }}
      rdp_user:  ${{ steps.create_user.outputs.rdp_user }}
      rdp_pass:  ${{ steps.create_user.outputs.rdp_pass }}

    steps:
      # ── 1. Full Random Jitter (30–300s) ──
      - name: Random Jitter
        run: |
          delay=$(( RANDOM % 271 + 30 ))
          echo "[*] Jitter delay: ${delay}s"
          sleep $delay

      # ── 2. System Info ──
      - name: System Info
        run: |
          echo "OS: $(lsb_release -ds)"
          echo "Kernel: $(uname -r)"
          echo "CPU: $(nproc --all) cores"
          mem=$(free -h | grep Mem | awk '{print $2}')
          echo "RAM: $mem"
          echo "Disk: $(df -h / | tail -1 | awk '{print $4}') free"
          echo "Host: $(hostname)"
          echo "Arch: $(uname -m)"

      # ── 3. Install Modern GNOME Desktop + xrdp ──
      - name: Install GNOME Desktop & xrdp
        id: xrdp_setup
        run: |
          sudo apt-get update -qq

          # Minimal Ubuntu desktop (GNOME) — no bloatware
          sudo apt-get install -y -qq ubuntu-desktop-minimal 2>&1 | tail -3

          # xrdp + xorgxrdp for hardware-accelerated RDP
          sudo apt-get install -y -qq xrdp xorgxrdp dbus-x11 2>&1 | tail -3

          # Configure xrdp to launch GNOME session
          sudo bash -c 'cat > /etc/xrdp/startwm.sh << EOF
#!/bin/sh
export GNOME_SHELL_SESSION_MODE=ubuntu
export XDG_CURRENT_DESKTOP=ubuntu:GNOME
export XDG_CONFIG_DIRS=/etc/xdg/xdg-ubuntu:/etc/xdg
export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/\$(id -u)/bus
export \$(dbus-launch)
test -x /etc/X11/Xsession && exec /etc/X11/Xsession
EOF'

          # 32-bit color depth for modern GNOME
          sudo sed -i 's/max_bpp=24/max_bpp=32/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/^port=3389/port=3389/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/^#port=3389/port=3389/' /etc/xrdp/xrdp.ini

          # Add xrdp to ssl-cert
          sudo usermod -a -G ssl-cert xrdp

          # Allow colord without polkit prompts
          sudo mkdir -p /etc/polkit-1/localauthority/50-local.d
          sudo bash -c 'cat > /etc/polkit-1/localauthority/50-local.d/45-allow-colord.pkla << EOF2
[Allow Colord all Users]
Identity=unix-user:*
Action=org.freedesktop.color-manager.create-device;org.freedesktop.color-manager.create-profile;org.freedesktop.color-manager.delete-device;org.freedesktop.color-manager.delete-profile;org.freedesktop.color-manager.modify-device;org.freedesktop.color-manager.modify-profile
ResultAny=no
ResultInactive=no
ResultActive=yes
EOF2'

          # User-level xsessionrc
          mkdir -p ~/.config
          cat > ~/.xsessionrc << 'EOF3'
export GNOME_SHELL_SESSION_MODE=ubuntu
export XDG_CURRENT_DESKTOP=ubuntu:GNOME
export XDG_CONFIG_DIRS=/etc/xdg/xdg-ubuntu:/etc/xdg
export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus
EOF3

          # Restart xrdp
          sudo systemctl restart xrdp
          sudo systemctl enable xrdp

          echo "[+] GNOME Desktop + xrdp installed on port 3389"

      # ── 4. Create Fully Randomized RDP User ──
      - name: Create RDP User
        id: create_user
        run: |
          # Password: 16 chars, all 4 categories, fully shuffled
          CHARS=$(cat /dev/urandom | tr -dc 'A-Za-z0-9!@#$%^&*()-_=+' | head -c16)
          PASS=$(echo "$CHARS" | fold -w1 | shuf | tr -d '\n')

          # Username: random 10-char alphanumeric
          USER="u$(tr -dc 'a-z0-9' < /dev/urandom | head -c9)"

          # Create user with full sudo + RDP access
          sudo useradd -m -G sudo -s /bin/bash "$USER" 2>/dev/null
          echo "$USER:$PASS" | sudo chpasswd

          echo "rdp_user=$USER"  >> "$GITHUB_OUTPUT"
          echo "rdp_pass=$PASS"  >> "$GITHUB_OUTPUT"
          echo "$PASS" > /tmp/.rdp_cred
          echo "[+] User: $USER  Pass: $PASS"

      # ── 5. GNOME Visual Tweaks (Modern Ubuntu Dark Theme) ──
      - name: Visual Tweaks (Modern GNOME)
        run: |
          # Apply settings for the runneradmin user (who xrdp sessions run as)
          sudo -u runneradmin dbus-launch gsettings set org.gnome.desktop.session idle-delay 0 2>/dev/null || true
          sudo -u runneradmin dbus-launch gsettings set org.gnome.desktop.screensaver lock-enabled false 2>/dev/null || true
          sudo -u runneradmin dbus-launch gsettings set org.gnome.desktop.screensaver idle-activation-enabled false 2>/dev/null || true
          sudo -u runneradmin dbus-launch gsettings set org.gnome.desktop.interface gtk-theme 'Yaru-dark' 2>/dev/null || true
          sudo -u runneradmin dbus-launch gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark' 2>/dev/null || true
          sudo -u runneradmin dbus-launch gsettings set org.gnome.desktop.interface enable-animations false 2>/dev/null || true
          sudo -u runneradmin dbus-launch gsettings set org.gnome.nautilus.preferences show-hidden-files true 2>/dev/null || true
          sudo -u runneradmin dbus-launch gsettings set org.gnome.desktop.notifications show-in-lock-screen false 2>/dev/null || true
          sudo -u runneradmin dbus-launch gsettings set org.gnome.desktop.wm.preferences button-layout ':minimize,maximize,close' 2>/dev/null || true

          echo "[+] Visual tweaks applied"

      # ── 6. Maximum Performance Tweaks ──
      - name: Maximum Performance Tweaks
        run: |
          # Disable ALL unnecessary services
          for svc in cups-browsed whoopsie ModemManager avahi-daemon \
                     bluetooth uuidd speech-dispatcher cups; do
            sudo systemctl disable --now "$svc" 2>/dev/null || true
          done

          # Kernel tweaks
          echo "vm.swappiness=10" | sudo tee -a /etc/sysctl.conf
          echo "net.core.rmem_max=134217728" | sudo tee -a /etc/sysctl.conf
          echo "net.core.wmem_max=134217728" | sudo tee -a /etc/sysctl.conf
          echo "net.ipv4.tcp_rmem=4096 87380 134217728" | sudo tee -a /etc/sysctl.conf
          echo "net.ipv4.tcp_wmem=4096 65536 134217728" | sudo tee -a /etc/sysctl.conf
          echo "net.ipv4.tcp_congestion_control=bbr" | sudo tee -a /etc/sysctl.conf
          echo "net.core.default_qdisc=fq" | sudo tee -a /etc/sysctl.conf
          echo "kernel.numa_balancing=0" | sudo tee -a /etc/sysctl.conf
          sudo sysctl -p

          # Remove bloatware packages (saves ~6GB)
          sudo apt-get remove -y -qq --purge \
            libreoffice* thunderbird* rhythmbox* gnome-games* \
            transmission* cheese* simple-scan* totem* 2>/dev/null || true
          sudo apt-get autoremove -y -qq 2>/dev/null || true
          sudo apt-get clean -qq 2>/dev/null || true

          # Focus follow mouse for RDP usability
          gsettings set org.gnome.desktop.wm.preferences focus-mode 'sloppy' 2>/dev/null || true

          echo "[+] Performance tweaks applied"

      # ── 7. Install Tailscale ──
      - name: Install Tailscale
        id: ts_install
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          echo "[+] Tailscale $(tailscale version)"

      # ── 8. Connect Tailscale (Random Hostname, Exit Node) ──
      - name: Connect Tailscale
        id: ts_connect
        run: |
          HOSTNAME="n$(tr -dc 'a-z0-9' < /dev/urandom | head -c12)"
          sudo tailscale up \
            --authkey="${{ secrets.TS_KEY }}" \
            --hostname="$HOSTNAME" \
            --advertise-exit-node \
            --accept-routes \
            --accept-dns=true
          sleep 15

          # Poll for IP (up to 2 min)
          IP=""
          for i in $(seq 1 30); do
            RAW=$(tailscale ip -4 2>&1)
            if echo "$RAW" | grep -qE '^100\.'; then
              IP=$(echo "$RAW" | tr -d '[:space:]')
              break
            fi
            sleep 4
          done
          [ -z "$IP" ] && IP="check-tailscale-status"

          echo "ts_ip=$IP" >> "$GITHUB_OUTPUT"
          echo "[+] Tailscale IP: $IP"

      # ── 9. Firewall ──
      - name: Firewall
        run: |
          sudo ufw allow 3389/tcp 2>/dev/null || true
          sudo ufw allow in on tailscale0 2>/dev/null || true
          echo "[+] Firewall rules set"

      # ── 10. Install Minimal Essential Tools Only ──
      - name: Install Tools
        run: |
          sudo apt-get install -y -qq \
            firefox nano htop curl wget git \
            python3-pip netcat-openbsd \
            2>&1 | tail -2
          echo "[+] Essential tools installed"

      # ── 11. Desktop Shortcuts (for RDP convenience) ──
      - name: Desktop Shortcuts
        run: |
          mkdir -p /home/runneradmin/Desktop
          # Firefox shortcut
          cat > /home/runneradmin/Desktop/firefox.desktop << 'EOF'
[Desktop Entry]
Name=Firefox
Exec=/usr/bin/firefox
Type=Application
Terminal=false
EOF
          chmod +x /home/runneradmin/Desktop/firefox.desktop

          # Terminal shortcut
          cat > /home/runneradmin/Desktop/terminal.desktop << 'EOF'
[Desktop Entry]
Name=Terminal
Exec=/usr/bin/gnome-terminal
Type=Application
Terminal=false
EOF
          chmod +x /home/runneradmin/Desktop/terminal.desktop

          # Files shortcut
          cat > /home/runneradmin/Desktop/files.desktop << 'EOF'
[Desktop Entry]
Name=Files
Exec=/usr/bin/nautilus
Type=Application
Terminal=false
EOF
          chmod +x /home/runneradmin/Desktop/files.desktop

          sudo chown -R runneradmin:runneradmin /home/runneradmin/Desktop

      # ── 12. ─────────────────────────────────────────────────
      # KEEP-ALIVE LOOP — runs for full 6 hours with:
      #   - Tailscale health check + auto-reconnect
      #   - xrdp health check + auto-restart
      #   - Disk space monitoring
      #   - Heartbeat every 10 min
      # ─────────────────────────────────────────────────────────
      - name: Keep-Alive (6-Hour Session)
        run: |
          IP="${{ steps.ts_connect.outputs.ts_ip }}"
          USER="${{ steps.create_user.outputs.rdp_user }}"
          PASS="${{ steps.create_user.outputs.rdp_pass }}"

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║           UBUNTU GNOME RDP — READY                          ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Tailscale IP : $IP"
          echo "║  Username     : $USER"
          echo "║  Password     : $PASS"
          echo "║  Port         : 3389"
          echo "║  Desktop      : GNOME (Ubuntu Modern Dark)"  
          echo "║  Uptime       : 6 hours (next cron overlaps)"  
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Connect:                                                      ║"
          echo "║    xfreerdp /v:$IP /u:$USER /p:$PASS /size:1920x1080 /gfx:h264 /network:lan /floatbar:sticky=off"
          echo "║    remmina -c rdp://$USER:$PASS@$IP:3389"
          echo "║    mstsc.exe (Windows) -> $IP:3389"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          END=$(date -d '+350 minutes' +%s)
          HEARTBEAT=$(date -d '+10 minutes' +%s)

          while [ "$(date +%s)" -lt "$END" ]; do
            # ── Health: Tailscale ──
            if ! tailscale status 2>&1 | grep -q "Connected"; then
              echo "[$(date '+%H:%M')] [!] Tailscale disconnected! Reconnecting..."
              NEW_HOST="n$(tr -dc 'a-z0-9' < /dev/urandom | head -c12)"
              sudo tailscale up \
                --authkey="${{ secrets.TS_KEY }}" \
                --hostname="$NEW_HOST" \
                --advertise-exit-node \
                --accept-routes \
                --accept-dns=true
              sleep 15
              NEW_IP=$(tailscale ip -4 2>&1 | tr -d '[:space:]')
              if echo "$NEW_IP" | grep -qE '^100\.'; then
                IP=$NEW_IP
                echo "[$(date '+%H:%M')] [+] Reconnected — new IP: $IP"
              fi
            fi

            # ── Health: xrdp ──
            if ! systemctl is-active --quiet xrdp 2>/dev/null; then
              echo "[$(date '+%H:%M')] [!] xrdp down! Restarting..."
              sudo systemctl restart xrdp
              sleep 3
              if systemctl is-active --quiet xrdp 2>/dev/null; then
                echo "[$(date '+%H:%M')] [+] xrdp restored"
              fi
            fi

            # ── Health: Disk ──
            DISK_USE=$(df / | tail -1 | awk '{print $5}' | tr -d '%')
            if [ "$DISK_USE" -gt 90 ]; then
              echo "[$(date '+%H:%M')] [!] Disk at ${DISK_USE}% — cleaning..."
              sudo apt-get clean -qq 2>/dev/null || true
              sudo journalctl --rotate --vacuum-time=1s 2>/dev/null || true
              sudo rm -rf /tmp/* 2>/dev/null || true
            fi

            # ── Heartbeat ──
            NOW=$(date +%s)
            if [ "$NOW" -ge "$HEARTBEAT" ]; then
              DISK=$(df -h / | tail -1 | awk '{print $4}')
              echo "[$(date '+%H:%M')] alive — $IP — disk: $DISK free"
              HEARTBEAT=$(date -d '+10 minutes' +%s)
            fi

            sleep 30
          done

          echo "[*] Session ended (next cron run will overlap seamlessly)"

      # ── 13. Cleanup (removes all traces) ──
      - name: Cleanup
        if: always()
        run: |
          USER="${{ steps.create_user.outputs.rdp_user }}"

          # Remove created user
          sudo userdel -r "$USER" 2>/dev/null || true

          # Remove credentials
          rm -f /tmp/.rdp_cred

          # Clear journal logs  
          sudo journalctl --rotate --vacuum-time=1s 2>/dev/null || true

          # Clear apt
          sudo apt-get clean 2>/dev/null || true

          # Clear bash history
          history -c 2>/dev/null || true
          > ~/.bash_history 2>/dev/null || true
          sudo rm -f /root/.bash_history 2>/dev/null || true

          # Clear temp
          sudo rm -rf /tmp/* 2>/dev/null || true

          # Disconnect Tailscale  
          sudo tailscale logout 2>/dev/null || true

          echo "[+] Cleanup complete — no traces left"

  # ─────────────────────────────────────────────────────────
  # JOB 3: Summary (always runs)
  # ─────────────────────────────────────────────────────────
  summary:
    needs: [disk-reaper, stealth-rdp]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Connection Summary
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║  SESSION DETAILS                             ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Tailscale IP : ${{ needs.stealth-rdp.outputs.ts_ip }}"
          echo "║  Username     : ${{ needs.stealth-rdp.outputs.rdp_user }}"
          echo "║  Password     : ${{ needs.stealth-rdp.outputs.rdp_pass }}"
          echo "║  Port         : 3389"
          echo "║  Space freed  : ${{ needs.disk-reaper.outputs.space_freed }}"
          echo "╚══════════════════════════════════════════════╝"

  # ─────────────────────────────────────────────────────────
  # JOB 4: Keep Repository Alive (prevents 60-day cron death)
  # ─────────────────────────────────────────────────────────
  keep-alive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Empty commit to keep cron alive
        run: |
          git config user.email "bot@localhost"
          git config user.name "KeepAlive Bot"
          git commit --allow-empty -m "chore: keep-alive $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
