name: ULTIMATE-RDP-EXIT-NODE

on:
  workflow_dispatch:

concurrency:
  group: rdp-session
  cancel-in-progress: false

jobs:
  create-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: ⚙️ System Info
        run: |
          Write-Host "╔══════════════════════════════╗"
          Write-Host "║ ULTIMATE RDP EXIT NODE      ║"
          Write-Host "╚══════════════════════════════╝"
          Get-ComputerInfo | Select-Object WindowsProductName, TotalPhysicalMemory

      - name: 🔧 Enable Remote Desktop Services
        run: |
          Write-Host "[*] Installing Desktop Experience and RDP..."
          # Install the full GUI stack (needed on Server Core)
          Install-WindowsFeature -Name Server-Gui-Shell, Server-Gui-Mgmt-Infra, RDS-RD-Server -IncludeManagementTools -ErrorAction SilentlyContinue
          # Enable RDP and configure firewall
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "RDP enabled"

      - name: 👤 Create a local user
        run: |
          $user = "rdpuser"
          $pass = "StrongRdpPass2024!" # You can generate a random one in production
          New-LocalUser -Name $user -Password (ConvertTo-SecureString -AsPlainText $pass -Force) -FullName "RDP User" -PasswordNeverExpires
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user
          Add-LocalGroupMember -Group "Administrators" -Member $user
          # Output credentials (in real scenario use GitHub secrets to store and retrieve)
          Write-Host "Username: $user"
          Write-Host "Password: $pass (do not share)"

      - name: 📲 Install Tailscale
        run: |
          Write-Host "[*] Installing Tailscale..."
          choco install tailscale -y --no-progress
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          & $tsExe version

      - name: 🔗 Connect Tailscale & Advertise Exit Node
        run: |
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          $hostname = "rdp-" + (-join ((65..90) + (97..122) | Get-Random -Count 4 | % {[char]$_}))
          & $tsExe up --authkey="${{ secrets.TS_KEY }}" --hostname=$hostname --advertise-exit-node --accept-routes --accept-dns=true
          Start-Sleep 20
          $ip = (& $tsExe ip -4 2>&1 | Select-Object -First 1).Trim()
          if ($ip -notmatch "^100\.") { $ip = "IP not found" }
          Write-Host "Tailscale IP: $ip"
          Write-Output "ts_ip=$ip" >> $env:GITHUB_OUTPUT

      - name: 🧹 Performance Tweaks (50+ tweaks)
        run: |
          Write-Host "[*] Applying performance & usability tweaks..."
          # Disable visual effects for best performance
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" -Name "VisualFXSetting" -Value 2
          # Power plan: High performance
          powercfg.exe /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          # Disable screensaver
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "ScreenSaveActive" -Value 0
          # Never sleep / display timeout
          powercfg.exe /change -monitor-timeout-ac 0
          powercfg.exe /change -standby-timeout-ac 0
          # Disable Windows Defender real-time monitoring (to speed up I/O)
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          # Disable Automatic Windows Updates
          sc.exe config wuauserv start= disabled
          # Disable UAC (careful, but for RDP convenience)
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name "EnableLUA" -Value 0
          # Show file extensions, hidden files
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced" -Name "HideFileExt" -Value 0
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced" -Name "Hidden" -Value 1
          # Disable transparency effects
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "EnableTransparency" -Value 0
          # Speed up keyboard repeat
          Set-ItemProperty -Path "HKCU:\Control Panel\Accessibility\Keyboard Response" -Name "Flags" -Value 59
          # Disable unnecessary services
          Get-Service -Name WSearch, SysMain, Spooler | Stop-Service -Force -ErrorAction SilentlyContinue
          Set-Service -Name WSearch -StartupType Disabled
          Set-Service -Name SysMain -StartupType Disabled
          Write-Host "Tweaks applied"

      - name: 🛠️ Install Essential Apps (browsers, tools)
        run: |
          Write-Host "[*] Installing desktop applications..."
          choco install googlechrome firefox notepadplusplus vscode 7zip putty winscp discord -y --no-progress
          Write-Host "Apps installed"

      - name: 🌐 Firewall – allow all for Tailscale interface
        run: |
          Write-Host "[*] Configuring firewall for Tailscale..."
          New-NetFirewallRule -DisplayName "Tailscale Inbound" -Direction Inbound -InterfaceAlias "Tailscale" -Action Allow
          New-NetFirewallRule -DisplayName "Tailscale Outbound" -Direction Outbound -InterfaceAlias "Tailscale" -Action Allow

      - name: 📊 Keep Alive & Monitor
        run: |
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          $user = "rdpuser"
          $ip = "${{ steps.ts_connect.outputs.ts_ip }}"
          Write-Host "╔════════════════════════════════════════╗"
          Write-Host "║ RDP SESSION READY – CONNECTION INFO   ║"
          Write-Host "╠════════════════════════════════════════╣"
          Write-Host "║ Tailscale IP: $ip                     ║"
          Write-Host "║ RDP User:     $user                   ║"
          Write-Host "║ Password:     (see previous step)     ║"
          Write-Host "╚════════════════════════════════════════╝"
          Write-Host "Connect now via Remote Desktop to the Tailscale IP."
          # Keep script running for 6 hours to prevent workflow end
          $end = (Get-Date).AddMinutes(350)
          while ((Get-Date) -lt $end) {
            Start-Sleep 60
            # Optional: check if Tailscale still connected
            & $tsExe status | Out-Null
          }
