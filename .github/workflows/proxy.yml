      - name: 24/7 Monitoring & Auto‑Recovery
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║  EXIT NODE OPERATIONAL - 24/7 MONITORING ACTIVE (macOS)   ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          
          TS_BIN="${{ steps.ts_install.outputs.ts_path }}"
          TSD_BIN="${{ steps.ts_install.outputs.tsd_path }}"
          HOSTNAME="${{ steps.credentials.outputs.hostname }}"
          TS_KEY="${{ secrets.TS_KEY }}"
          TS_IP="${{ steps.ts_connect.outputs.ts_ip }}"
          RDP_USER="${{ steps.credentials.outputs.username }}"
          
          echo "Hostname:      $HOSTNAME"
          echo "TS IP:         $TS_IP"
          echo "RDP User:      $RDP_USER"
          echo "Status:        READY"
          echo "Platform:      macOS (headless)"
          echo ""
          
          FAIL_COUNT=0
          HEALTH_COUNT=0
          RECOVERY_COUNT=0
          START_TIME=$(date +%s)
          
          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            HOURS=$((ELAPSED / 3600))
            MINUTES=$(((ELAPSED % 3600) / 60))
            UPTIME=$(printf "%dh %02dm" $HOURS $MINUTES)
            
            ONLINE=false
            TS_CHECK=""
            
            # First check if daemon is running
            if pgrep -f tailscaled >/dev/null 2>&1; then
              # Use tailscale status to see if this node is online
              STATUS_OUT=$(sudo $TS_BIN --socket=/var/run/tailscale/tailscaled.sock status 2>&1)
              
              # Get the IP of this node (should still be present)
              TS_CHECK=$(echo "$STATUS_OUT" | grep "$HOSTNAME" | awk '{print $1}')
              
              # Also try to get IP via direct command
              if [ -z "$TS_CHECK" ]; then
                TS_CHECK=$(sudo $TS_BIN --socket=/var/run/tailscale/tailscaled.sock ip -4 2>/dev/null)
              fi
              
              # A node is online if its IP appears in the status and the status line doesn't contain "offline"
              if [[ $TS_CHECK == 100.* ]] && ! echo "$STATUS_OUT" | grep "$TS_CHECK" | grep -q "offline"; then
                ONLINE=true
              fi
            fi
            
            if $ONLINE; then
              FAIL_COUNT=0
              HEALTH_COUNT=$((HEALTH_COUNT + 1))
              TIMESTAMP=$(date '+%H:%M:%S')
              echo "[$TIMESTAMP] ✅ OK | IP: $TS_CHECK | Uptime: $UPTIME | Checks: $HEALTH_COUNT"
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              TIMESTAMP=$(date '+%H:%M:%S')
              echo "[$TIMESTAMP] ❌ Node offline ($FAIL_COUNT/3)"
              
              if [ $FAIL_COUNT -ge 3 ]; then
                echo "[$TIMESTAMP] 🔄 Auto-recovery initiated..."
                RECOVERY_COUNT=$((RECOVERY_COUNT + 1))
                
                sudo pkill -9 tailscaled 2>/dev/null || true
                sleep 3
                
                sudo $TSD_BIN \
                  --state=/var/lib/tailscale/tailscaled.state \
                  --socket=/var/run/tailscale/tailscaled.sock \
                  --port=${{ env.TS_PORT }} \
                  --tun=userspace-networking \
                  > /tmp/tailscaled_recovery.log 2>&1 &
                
                sleep 10
                
                sudo $TS_BIN \
                  --socket=/var/run/tailscale/tailscaled.sock \
                  up \
                  --authkey=$TS_KEY \
                  --hostname=$HOSTNAME \
                  --advertise-exit-node \
                  --accept-routes \
                  --accept-dns=true 2>&1
                
                FAIL_COUNT=0
                sleep 15
                echo "[$TIMESTAMP] ✓ Recovery complete"
              fi
            fi
            
            # Graceful exit before 6‑hour timeout (350 minutes)
            if [ $ELAPSED -ge 21000 ]; then
              echo ""
              echo "════════════════════════════════════════════════════════"
              echo "  TIMEOUT APPROACHING – GRACEFUL EXIT"
              echo "════════════════════════════════════════════════════════"
              echo "  Uptime:       $UPTIME"
              echo "  Health checks: $HEALTH_COUNT"
              echo "  Recoveries:    $RECOVERY_COUNT"
              break
            fi
            
            sleep ${{ env.HEALTH_CHECK_INTERVAL }}
          done
