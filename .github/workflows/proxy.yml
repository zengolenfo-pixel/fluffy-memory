name: Ultra Smooth RDP 60Hz

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Enable RDP
      shell: powershell
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1

    - name: Create User
      shell: powershell
      run: |
        $password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
        New-LocalUser "runner" -Password $password -FullName "runner" -Description "runner"
        Add-LocalGroupMember -Group "Administrators" -Member "runner"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runner"

    - name: Performance Tweaks
      shell: powershell
      run: |
        # WDDM driver
        reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services" /v fEnableWddmDriver /t REG_DWORD /d 1 /f

        # smoother frame interval
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations" /v DWMFRAMEINTERVAL /t REG_DWORD /d 15 /f

        # enable UDP
        reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services\Client" /v fClientDisableUDP /t REG_DWORD /d 0 /f

        # reduce visual lag
        reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f

        # disable animations
        reg add "HKCU\Control Panel\Desktop\WindowMetrics" /v MinAnimate /t REG_SZ /d 0 /f
        reg add "HKCU\Software\Microsoft\Windows\DWM" /v EnableAeroPeek /t REG_DWORD /d 0 /f

        # network tweaks
        netsh int tcp set global autotuninglevel=normal
        netsh int tcp set global rss=enabled

        # high performance power plan
        powercfg -setactive SCHEME_MIN

    - name: Install Cloudflared
      shell: powershell
      run: |
        Invoke-WebRequest https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe -OutFile cloudflared.exe

    - name: Start Tunnel
      shell: powershell
      run: |
        Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url tcp://localhost:3389" -NoNewWindow

        Start-Sleep 15

        Invoke-WebRequest http://127.0.0.1:4040/api/tunnels -UseBasicParsing

    - name: Show RDP Info
      shell: powershell
      run: |
        Write-Host "=================================="
        Write-Host "USER: runner"
        Write-Host "PASS: P@ssw0rd123!"
        Write-Host "Resolution recommended: 1280x720"
        Write-Host "Set RDP client to LAN mode + UDP"
        Write-Host "=================================="

    - name: Keep Alive
      shell: powershell
      run: |
        while ($true) {
          Start-Sleep -Seconds 60
        }
