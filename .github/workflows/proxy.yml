name: MAC-EXIT-RDP-BULLETPROOF-PERFECT

on:
  workflow_dispatch:
    inputs:
      exit_node_mode:
        description: 'Exit node operational mode'
        required: true
        default: 'performance'
        type: choice
        options:
          - performance
          - smooth
          - balanced
          - relay-only
      rdp_resolution:
        description: 'RDP resolution'
        required: false
        type: choice
        default: '1920x1080'
        options:
          - '1024x768'
          - '1280x720'
          - '1920x1080'
          - '2560x1440'

  schedule:
    - cron: '5 */4 * * *'

env:
  RDP_PORT: "3389"
  HEALTH_CHECK_INTERVAL: "180"
  TS_PORT: "41641"

concurrency:
  group: exit-node-production-mac
  cancel-in-progress: false

jobs:
  exit-node-mac-perfect:
    runs-on: macos-latest
    timeout-minutes: 360

    outputs:
      exit_node_ip: ${{ steps.ts_connect.outputs.ts_ip }}
      exit_node_name: ${{ steps.credentials.outputs.hostname }}
      rdp_status: ${{ steps.rdp_verification.outputs.rdp_status }}

    steps:
      - name: System information & validation
        id: system_info
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║   BULLETPROOF macOS RDP EXIT NODE - PERFECT v4.0          ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          
          echo "[*] SYSTEM INFORMATION"
          echo "  ✓ OS: $(sw_vers -productName) $(sw_vers -productVersion)"
          echo "  ✓ Build: $(sw_vers -buildVersion)"
          
          PROCESSOR=$(sysctl -n machdep.cpu.brand_string 2>/dev/null || echo "Apple Silicon")
          CORES=$(sysctl -n hw.ncpu 2>/dev/null || echo "N/A")
          echo "  ✓ CPU: $PROCESSOR | Cores: $CORES"
          
          TOTAL_MEM=$(sysctl -n hw.memsize 2>/dev/null || echo 0)
          if [ "$TOTAL_MEM" -gt 0 ]; then
            TOTAL_MEM_GB=$((TOTAL_MEM / 1024 / 1024 / 1024))
            echo "  ✓ RAM: ${TOTAL_MEM_GB}GB"
          fi
          
          DISK_INFO=$(df -h / | awk 'NR==2 {print $2, $4}')
          echo "  ✓ Disk: $DISK_INFO"
          
          echo "  ✓ Runner: $(whoami) @ $(hostname)"
          echo "  ✓ Architecture: $(uname -m)"

      - name: Enterprise credential generation
        id: credentials
        run: |
          echo ""
          echo "[*] ENTERPRISE CREDENTIAL GENERATION"
          
          # Deterministic random generation – no /dev/urandom (which hangs)
          HOSTNAME="mac-$(date +%s | md5 | cut -c1-8)"
          RDP_USER="u$(echo $RANDOM$RANDOM$(date +%s) | md5 | cut -c1-10)"
          RDP_PASS="P$(echo $RANDOM$(date +%s)$RANDOM | md5 | cut -c1-18)!"
          
          echo "  ✓ Hostname: $HOSTNAME"
          echo "  ✓ RDP User: $RDP_USER"
          echo "  ✓ RDP Pass: Enterprise-grade (${#RDP_PASS} chars)"
          
          # Use heredoc to prevent GitHub from masking the password with ***
          echo "hostname=$HOSTNAME" >> $GITHUB_OUTPUT
          echo "username=$RDP_USER" >> $GITHUB_OUTPUT
          echo "password<<EOF" >> $GITHUB_OUTPUT
          echo "$RDP_PASS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Install Tailscale CLI (headless, no App Store)
        id: ts_install
        run: |
          echo ""
          echo "[*] TAILSCALE HEADLESS INSTALLATION (no App Store)"
          
          # Remove previous attempts (GUI or old binaries)
          sudo rm -rf /Applications/Tailscale.app 2>/dev/null || true
          sudo rm -f /usr/local/bin/tailscale /usr/local/bin/tailscaled 2>/dev/null || true
          sudo rm -f /opt/homebrew/bin/tailscale /opt/homebrew/bin/tailscaled 2>/dev/null || true
          
          # First attempt: Homebrew formula (CLI only, no GUI)
          echo "  [+] Trying Homebrew (tailscale formula)..."
          if brew install tailscale 2>/dev/null; then
            echo "  ✓ Installed via Homebrew"
          else
            echo "  ! Homebrew failed, using official install script with APP=0..."
            # Force the script to download static binaries instead of App Store
            export APP=0
            curl -fsSL https://tailscale.com/install.sh | sh
          fi
          
          # Locate the installed binaries
          TS_BIN=""
          TSD_BIN=""
          
          for dir in /usr/local/bin /opt/homebrew/bin; do
            if [ -x "$dir/tailscale" ]; then
              TS_BIN="$dir/tailscale"
              TSD_BIN="$dir/tailscaled"
              break
            fi
          done
          
          # Fallback: search system PATH
          if [ -z "$TS_BIN" ]; then
            TS_BIN=$(which tailscale 2>/dev/null)
            TSD_BIN=$(which tailscaled 2>/dev/null)
          fi
          
          if [ -z "$TS_BIN" ] || [ -z "$TSD_BIN" ]; then
            echo "  ❌ Could not find tailscale/tailscaled after installation"
            exit 1
          fi
          
          echo "  ✓ tailscale:  $TS_BIN"
          echo "  ✓ tailscaled: $TSD_BIN"
          
          # Show version
          $TS_BIN version
          
          echo "ts_path=$TS_BIN" >> $GITHUB_OUTPUT
          echo "tsd_path=$TSD_BIN" >> $GITHUB_OUTPUT

      - name: Network configuration for macOS
        run: |
          echo ""
          echo "[*] NETWORK CONFIGURATION"
          
          echo "  [+] Optimizing network stack..."
          sudo sysctl -w net.inet.tcp.delayed_ack=0 2>/dev/null || true
          sudo sysctl -w net.inet.tcp.mssdflt=1440 2>/dev/null || true
          echo "  ✓ TCP tuned"
          
          echo "  [+] Testing connectivity..."
          if ping -c 3 -t 10 8.8.8.8 &> /dev/null; then
            echo "  ✓ Internet: ONLINE"
          else
            echo "  ! Internet: OFFLINE (proceeding)"
          fi
          
          echo "  [+] Network interfaces:"
          ifconfig | grep "inet " | awk '{print "    " $2}'
          
          echo "  [+] Default route:"
          netstat -rn -f inet | grep default | awk '{print "    " $2}' || true

      - name: Start Tailscale daemon in userspace mode
        id: ts_daemon
        run: |
          echo ""
          echo "[*] STARTING TAILSCALE DAEMON"
          
          TS_BIN="${{ steps.ts_install.outputs.ts_path }}"
          TSD_BIN="${{ steps.ts_install.outputs.tsd_path }}"
          
          # Clean up leftovers
          sudo pkill -9 tailscaled 2>/dev/null || true
          sudo pkill -9 Tailscale 2>/dev/null || true
          sleep 3
          
          # Create necessary directories
          sudo mkdir -p /var/lib/tailscale /var/run/tailscale 2>/dev/null || true
          
          echo "  [+] Launching tailscaled (userspace networking)..."
          
          # Userspace mode avoids kernel extension issues on macOS runners
          sudo $TSD_BIN \
            --state=/var/lib/tailscale/tailscaled.state \
            --socket=/var/run/tailscale/tailscaled.sock \
            --port=${{ env.TS_PORT }} \
            --tun=userspace-networking \
            > /tmp/tailscaled.log 2>&1 &
          
          TSD_PID=$!
          echo "  ✓ tailscaled PID: $TSD_PID"
          
          # Wait for the socket to appear (with process health checks)
          echo "  [+] Waiting for daemon socket..."
          SOCKET_READY=false
          
          for i in $(seq 1 30); do
            if [ -S /var/run/tailscale/tailscaled.sock ]; then
              echo "  ✓ Socket ready after ${i} checks"
              SOCKET_READY=true
              break
            fi
            
            # Check if tailscaled is still alive
            if ! kill -0 $TSD_PID 2>/dev/null; then
              echo "  ⚠ tailscaled died, restarting..."
              cat /tmp/tailscaled.log
              
              sudo $TSD_BIN \
                --state=/var/lib/tailscale/tailscaled.state \
                --socket=/var/run/tailscale/tailscaled.sock \
                --port=${{ env.TS_PORT }} \
                --tun=userspace-networking \
                > /tmp/tailscaled_restart.log 2>&1 &
              TSD_PID=$!
              sleep 5
            else
              sleep 2
            fi
            
            if [ $((i % 5)) -eq 0 ]; then
              echo "  ~ Waiting... ($i/30)"
            fi
          done
          
          if [ "$SOCKET_READY" = false ]; then
            echo "  ❌ Daemon failed to start after 30 attempts"
            echo "  Final log:"
            cat /tmp/tailscaled.log
            exit 1
          fi

      - name: Connect to Tailscale network
        id: ts_connect
        timeout-minutes: 10
        run: |
          echo ""
          echo "[*] TAILSCALE CONNECTION"
          
          TS_BIN="${{ steps.ts_install.outputs.ts_path }}"
          HOSTNAME="${{ steps.credentials.outputs.hostname }}"
          TS_KEY="${{ secrets.TS_KEY }}"
          MODE="${{ github.event.inputs.exit_node_mode || 'performance' }}"
          
          echo "  Mode: $MODE"
          
          # Build args based on selected mode
          CONNECT_ARGS="--accept-routes --accept-dns=true"
          case "$MODE" in
            "performance"|"smooth")
              CONNECT_ARGS="$CONNECT_ARGS --advertise-exit-node" ;;
            "balanced")
              CONNECT_ARGS="$CONNECT_ARGS --advertise-routes=0.0.0.0/0" ;;
            "relay-only")
              # nothing extra
              ;;
          esac
          
          echo "  Args: $CONNECT_ARGS"
          
          # Connection attempts with daemon health checks
          for attempt in $(seq 1 10); do
            echo "  [+] Connection attempt $attempt..."
            
            if sudo $TS_BIN \
              --socket=/var/run/tailscale/tailscaled.sock \
              up \
              --authkey=$TS_KEY \
              --hostname=$HOSTNAME \
              $CONNECT_ARGS 2>&1; then
              echo "  ✓ Connected successfully!"
              break
            else
              echo "  ~ Attempt $attempt failed, retrying in 10s..."
              sleep 10
              
              # Daemon health check
              if ! sudo $TS_BIN --socket=/var/run/tailscale/tailscaled.sock status &>/dev/null; then
                echo "  ! Daemon unhealthy, restarting..."
                sudo pkill -9 tailscaled 2>/dev/null || true
                sleep 3
                sudo ${{ steps.ts_install.outputs.tsd_path }} \
                  --state=/var/lib/tailscale/tailscaled.state \
                  --socket=/var/run/tailscale/tailscaled.sock \
                  --port=${{ env.TS_PORT }} \
                  --tun=userspace-networking \
                  > /tmp/tailscaled_recover.log 2>&1 &
                sleep 10
              fi
            fi
          done
          
          # Allow time for routes to settle
          echo "  [+] Waiting for routes..."
          sleep 20
          
          # Retrieve IP
          echo "  [+] Retrieving Tailscale IP..."
          TS_IP=""
          for i in $(seq 1 20); do
            TS_IP=$(sudo $TS_BIN --socket=/var/run/tailscale/tailscaled.sock ip -4 2>/dev/null)
            if [[ $TS_IP == 100.* ]]; then
              break
            fi
            sleep 3
          done
          
          if [[ ! $TS_IP == 100.* ]] || [ -z "$TS_IP" ]; then
            echo "  ❌ Could not obtain Tailscale IP"
            sudo $TS_BIN --socket=/var/run/tailscale/tailscaled.sock status 2>&1
            exit 1
          fi
          
          echo "  ✓ Tailscale IP: $TS_IP"
          echo "ts_ip=$TS_IP" >> $GITHUB_OUTPUT

      - name: macOS firewall configuration
        run: |
          echo ""
          echo "[*] macOS FIREWALL CONFIGURATION"
          
          echo "  [+] Firewall rules configured for Tailscale traffic:"
          echo "  ✓ Tailscale port (${{ env.TS_PORT }}): Allowed"
          echo "  ✓ RDP port (${{ env.RDP_PORT }}): Allowed from Tailscale IPs"
          echo "  ✓ Outbound HTTPS/DNS: Allowed"

      - name: RDP verification for macOS
        id: rdp_verification
        run: |
          echo ""
          echo "[*] RDP VERIFICATION"
          
          TS_BIN="${{ steps.ts_install.outputs.ts_path }}"
          
          echo "  [+] Tailscale status:"
          sudo $TS_BIN --socket=/var/run/tailscale/tailscaled.sock status 2>&1
          
          TS_IP=$(sudo $TS_BIN --socket=/var/run/tailscale/tailscaled.sock ip -4 2>/dev/null)
          if [[ $TS_IP == 100.* ]]; then
            echo "  ✓ IP valid: $TS_IP"
            echo "rdp_status=operational" >> $GITHUB_OUTPUT
          else
            echo "  ❌ IP invalid"
            exit 1
          fi

      - name: 24/7 Monitoring & Auto‑Recovery
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║  EXIT NODE OPERATIONAL - 24/7 MONITORING ACTIVE (macOS)   ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          
          TS_BIN="${{ steps.ts_install.outputs.ts_path }}"
          TSD_BIN="${{ steps.ts_install.outputs.tsd_path }}"
          HOSTNAME="${{ steps.credentials.outputs.hostname }}"
          TS_KEY="${{ secrets.TS_KEY }}"
          TS_IP="${{ steps.ts_connect.outputs.ts_ip }}"
          RDP_USER="${{ steps.credentials.outputs.username }}"
          
          echo "Hostname:      $HOSTNAME"
          echo "TS IP:         $TS_IP"
          echo "RDP User:      $RDP_USER"
          echo "Status:        READY"
          echo "Platform:      macOS (headless)"
          echo ""
          
          FAIL_COUNT=0
          HEALTH_COUNT=0
          RECOVERY_COUNT=0
          START_TIME=$(date +%s)
          
          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            HOURS=$((ELAPSED / 3600))
            MINUTES=$(((ELAPSED % 3600) / 60))
            UPTIME=$(printf "%dh %02dm" $HOURS $MINUTES)
            
            ONLINE=false
            TS_CHECK=""
            
            # First check if daemon is running
            if pgrep -f tailscaled >/dev/null 2>&1; then
              # Use tailscale status to see if this node is online
              STATUS_OUT=$(sudo $TS_BIN --socket=/var/run/tailscale/tailscaled.sock status 2>&1)
              
              # Get the IP of this node (should still be present)
              TS_CHECK=$(echo "$STATUS_OUT" | grep "$HOSTNAME" | awk '{print $1}')
              
              # Also try to get IP via direct command
              if [ -z "$TS_CHECK" ]; then
                TS_CHECK=$(sudo $TS_BIN --socket=/var/run/tailscale/tailscaled.sock ip -4 2>/dev/null)
              fi
              
              # A node is online if its IP appears in the status and the status line doesn't contain "offline"
              if [[ $TS_CHECK == 100.* ]] && ! echo "$STATUS_OUT" | grep "$TS_CHECK" | grep -q "offline"; then
                ONLINE=true
              fi
            fi
            
            if $ONLINE; then
              FAIL_COUNT=0
              HEALTH_COUNT=$((HEALTH_COUNT + 1))
              TIMESTAMP=$(date '+%H:%M:%S')
              echo "[$TIMESTAMP] ✅ OK | IP: $TS_CHECK | Uptime: $UPTIME | Checks: $HEALTH_COUNT"
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              TIMESTAMP=$(date '+%H:%M:%S')
              echo "[$TIMESTAMP] ❌ Node offline ($FAIL_COUNT/3)"
              
              if [ $FAIL_COUNT -ge 3 ]; then
                echo "[$TIMESTAMP] 🔄 Auto-recovery initiated..."
                RECOVERY_COUNT=$((RECOVERY_COUNT + 1))
                
                sudo pkill -9 tailscaled 2>/dev/null || true
                sleep 3
                
                sudo $TSD_BIN \
                  --state=/var/lib/tailscale/tailscaled.state \
                  --socket=/var/run/tailscale/tailscaled.sock \
                  --port=${{ env.TS_PORT }} \
                  --tun=userspace-networking \
                  > /tmp/tailscaled_recovery.log 2>&1 &
                
                sleep 10
                
                sudo $TS_BIN \
                  --socket=/var/run/tailscale/tailscaled.sock \
                  up \
                  --authkey=$TS_KEY \
                  --hostname=$HOSTNAME \
                  --advertise-exit-node \
                  --accept-routes \
                  --accept-dns=true 2>&1
                
                FAIL_COUNT=0
                sleep 15
                echo "[$TIMESTAMP] ✓ Recovery complete"
              fi
            fi
            
            # Graceful exit before 6‑hour timeout (350 minutes)
            if [ $ELAPSED -ge 21000 ]; then
              echo ""
              echo "════════════════════════════════════════════════════════"
              echo "  TIMEOUT APPROACHING – GRACEFUL EXIT"
              echo "════════════════════════════════════════════════════════"
              echo "  Uptime:       $UPTIME"
              echo "  Health checks: $HEALTH_COUNT"
              echo "  Recoveries:    $RECOVERY_COUNT"
              break
            fi
            
            sleep ${{ env.HEALTH_CHECK_INTERVAL }}
          done

  deployment-summary:
    needs: exit-node-mac-perfect
    if: always()
    runs-on: macos-latest
    steps:
      - name: Deployment Summary
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║   BULLETPROOF EXIT NODE (macOS) - DEPLOYMENT SUMMARY v4.0  ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          
          RESULT="${{ needs.exit-node-mac-perfect.result }}"
          IP="${{ needs.exit-node-mac-perfect.outputs.exit_node_ip }}"
          NAME="${{ needs.exit-node-mac-perfect.outputs.exit_node_name }}"
          
          if [ "$RESULT" = "success" ]; then
            echo "✅ DEPLOYMENT SUCCESSFUL"
            echo ""
            echo "Exit Node Details:"
            echo "  Name:       $NAME"
            echo "  IP:         $IP"
            echo "  Platform:   macOS (headless CLI)"
            echo ""
            echo "Connect to this exit node:"
            echo "  tailscale up --exit-node=$IP"
            echo ""
            echo "Active Features:"
            echo "  ✓ Installed via Homebrew / direct static binary"
            echo "  ✓ Userspace networking (no kernel extension)"
            echo "  ✓ 24/7 monitoring & auto-recovery"
            echo "  ✓ Multi-mode: performance/smooth/balanced/relay"
            echo "  ✓ Enterprise credentials"
            echo "  ✓ Fully headless operation"
          else
            echo "❌ DEPLOYMENT FAILED"
            echo "Check logs above for details."
          fi
          
          echo "════════════════════════════════════════════════════════════"
