name: WIN-EXIT-NODE-SMOOTH

on:
  workflow_dispatch:
    inputs:
      exit_node_mode:
        description: 'Exit node mode'
        required: true
        default: 'performance'
        type: choice
        options:
          - performance
          - relay-only

  schedule:
    - cron: '5 */4 * * *'

concurrency:
  group: exit-node-windows
  cancel-in-progress: false

jobs:
  windows-exit-node:
    runs-on: windows-latest
    timeout-minutes: 360

    outputs:
      exit_node_ip: ${{ steps.ts_connect.outputs.ts_ip }}

    steps:
      - name: System information
        run: |
          Write-Host "=============================="
          Write-Host "Windows Exit Node вЂ“ Smooth v1.0"
          Write-Host "=============================="
          Write-Host "OS: $((Get-CimInstance Win32_OperatingSystem).Caption)"
          Write-Host "CPU: $((Get-CimInstance Win32_Processor).Name)"
          Write-Host "RAM: $([math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory/1GB,2)) GB"

      - name: Install Tailscale
        run: |
          Write-Host "[*] Installing Tailscale..."
          choco install tailscale -y --no-progress

          # Default installation path (MSI)
          if (Test-Path "C:\Program Files\Tailscale\tailscale.exe") {
            Write-Host "Tailscale found at: C:\Program Files\Tailscale\tailscale.exe"
          } else {
            Write-Host "Searching for tailscale.exe..."
            $found = Get-ChildItem -Path "C:\Program Files" -Recurse -Filter tailscale.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $found) {
              Write-Host "ERROR: tailscale.exe not found"
              exit 1
            }
            Write-Host "Tailscale found at: $($found.FullName)"
          }
          & "C:\Program Files\Tailscale\tailscale.exe" version

      - name: Connect to Tailscale
        id: ts_connect
        run: |
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          if (-not (Test-Path $tsExe)) {
            $tsExe = (Get-ChildItem -Path "C:\Program Files" -Recurse -Filter tailscale.exe -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          $hostname = "win-" + (-join ((65..90) + (97..122) | Get-Random -Count 6 | ForEach-Object {[char]$_}))
          $mode = "${{ github.event.inputs.exit_node_mode || 'performance' }}"

          Write-Host "[*] Connecting to Tailscale (using $tsExe)"

          # Build command with explicit, separate arguments вЂ“ NO splatting
          if ($mode -eq "performance") {
            & $tsExe up --authkey="${{ secrets.TS_KEY }}" --hostname=$hostname --accept-routes --accept-dns=true --advertise-exit-node
          } else {
            & $tsExe up --authkey="${{ secrets.TS_KEY }}" --hostname=$hostname --accept-routes --accept-dns=true
          }

          Start-Sleep -Seconds 20

          # Retrieve IP вЂ“ safely handle errors
          $ip = $null
          for ($i=0; $i -lt 15; $i++) {
            $raw = & $tsExe ip -4 2>&1
            if ($raw -is [string] -and $raw.Trim() -match "^100\.") {
              $ip = $raw.Trim()
              break
            }
            Start-Sleep -Seconds 5
          }

          if (-not $ip) {
            Write-Host "ERROR: Could not obtain Tailscale IP. Status:"
            & $tsExe status
            exit 1
          }

          Write-Host "Exit node IP: $ip"
          Write-Output "ts_ip=$ip" >> $env:GITHUB_OUTPUT

      - name: 24/7 Monitor & Auto-Recovery
        run: |
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          if (-not (Test-Path $tsExe)) {
            $tsExe = (Get-ChildItem -Path "C:\Program Files" -Recurse -Filter tailscale.exe -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          $ip = "${{ steps.ts_connect.outputs.ts_ip }}"
          $hostname = "win-" + (-join ((65..90) + (97..122) | Get-Random -Count 6 | ForEach-Object {[char]$_}))
          $failCount = 0
          $healthCount = 0
          $startTime = Get-Date

          Write-Host "в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—"
          Write-Host "в•‘   EXIT NODE LIVE вЂ“ WINDOWS SMOOTH   в•‘"
          Write-Host "в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ"
          Write-Host "Hostname: $hostname"
          Write-Host "IP: $ip"
          Write-Host ""

          while ($true) {
            $elapsed = (Get-Date) - $startTime
            $uptime = "{0}h {1:D2}m" -f [math]::Floor($elapsed.TotalHours), $elapsed.Minutes
            $timestamp = Get-Date -Format "HH:mm:ss"

            $online = $false
            $statusOut = & $tsExe status 2>&1 | Out-String

            # Node is online if its IP appears and no "offline" on that line
            if ($statusOut -match $ip -and $statusOut -notmatch "offline") {
              $online = $true
            }

            if ($online) {
              $failCount = 0
              $healthCount++
              Write-Host "[$timestamp] вњ… ONLINE | $ip | Uptime: $uptime | Checks: $healthCount"
            } else {
              $failCount++
              Write-Host "[$timestamp] вќЊ OFFLINE ($failCount/3)"
              if ($failCount -ge 3) {
                Write-Host "[$timestamp] рџ”„ Reconnecting..."
                # Reconnect with full exit-node flags
                & $tsExe up --authkey="${{ secrets.TS_KEY }}" --hostname=$hostname --advertise-exit-node --accept-routes --accept-dns=true
                $failCount = 0
                Start-Sleep -Seconds 15
              }
            }

            # Exit before 6вЂ‘hour timeout (350 minutes)
            if ($elapsed.TotalSeconds -ge 21000) {
              Write-Host "в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—"
              Write-Host "в•‘   TIMEOUT вЂ“ GRACEFUL SHUTDOWN       в•‘"
              Write-Host "в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ"
              Write-Host "Uptime: $uptime | Health checks: $healthCount"
              break
            }

            Start-Sleep -Seconds 180
          }

  summary:
    needs: windows-exit-node
    if: always()
    runs-on: windows-latest
    steps:
      - run: |
          if ("${{ needs.windows-exit-node.result }}" -eq "success") {
            Write-Host "вњ… EXIT NODE DEPLOYED (Windows)"
            Write-Host "IP: ${{ needs.windows-exit-node.outputs.exit_node_ip }}"
          } else {
            Write-Host "вќЊ DEPLOYMENT FAILED"
          }
