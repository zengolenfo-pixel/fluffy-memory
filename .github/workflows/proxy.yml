name: WIN-EXIT-NODE-SMOOTH

on:
  workflow_dispatch:
    inputs:
      exit_node_mode:
        description: 'Exit node mode'
        required: true
        default: 'performance'
        type: choice
        options:
          - performance
          - relay-only

  schedule:
    - cron: '5 */4 * * *'

env:
  TS_PORT: "41641"

concurrency:
  group: exit-node-windows
  cancel-in-progress: false

jobs:
  windows-exit-node:
    runs-on: windows-latest
    timeout-minutes: 360

    outputs:
      exit_node_ip: ${{ steps.ts_connect.outputs.ts_ip }}

    steps:
      - name: System information
        run: |
          Write-Host "=============================="
          Write-Host "Windows Exit Node – Smooth v1.0"
          Write-Host "=============================="
          Write-Host "OS: $((Get-CimInstance Win32_OperatingSystem).Caption)"
          Write-Host "CPU: $((Get-CimInstance Win32_Processor).Name)"
          Write-Host "RAM: $([math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory/1GB,2)) GB"

      - name: Install Tailscale
        run: |
          Write-Host "[*] Installing Tailscale..."
          choco install tailscale -y --no-progress
          # Refresh environment
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "Tailscale version:"
          tailscale version

      - name: Connect to Tailscale
        id: ts_connect
        run: |
          Write-Host "[*] Connecting to Tailscale..."
          $hostname = "win-" + ((Get-Date).ToUniversalTime().Ticks % 100000).ToString("X4")
          $mode = "${{ github.event.inputs.exit_node_mode || 'performance' }}"
          
          $args = "--accept-routes --accept-dns=true"
          if ($mode -eq "performance") {
            $args += " --advertise-exit-node"
          }
          
          tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=$hostname $args
          
          Start-Sleep -Seconds 20
          
          # Retrieve IP
          $ip = $null
          for ($i=0; $i -lt 15; $i++) {
            $ip = (tailscale ip -4 2>&1 | Select-Object -First 1).Trim()
            if ($ip -match "^100\.") { break }
            Start-Sleep -Seconds 5
          }
          
          if (-not $ip -or $ip -notmatch "^100\.") {
            Write-Host "ERROR: Could not obtain Tailscale IP"
            tailscale status
            exit 1
          }
          
          Write-Host "Exit node IP: $ip"
          Write-Output "ts_ip=$ip" >> $env:GITHUB_OUTPUT

      - name: 24/7 Monitor & Auto-Recovery
        run: |
          Write-Host "╔══════════════════════════════════════╗"
          Write-Host "║   EXIT NODE LIVE – WINDOWS SMOOTH   ║"
          Write-Host "╚══════════════════════════════════════╝"
          Write-Host ""
          
          $hostname = "win-" + ((Get-Date).ToUniversalTime().Ticks % 100000).ToString("X4")
          $ip = "${{ steps.ts_connect.outputs.ts_ip }}"
          $failCount = 0
          $healthCount = 0
          $startTime = Get-Date
          
          while ($true) {
            $elapsed = (Get-Date) - $startTime
            $uptime = "{0}h {1:D2}m" -f [math]::Floor($elapsed.TotalHours), $elapsed.Minutes
            $timestamp = Get-Date -Format "HH:mm:ss"
            
            $online = $false
            $statusOut = tailscale status 2>&1 | Out-String
            
            # Check for our node online
            if ($statusOut -match $ip -and $statusOut -notmatch "offline") {
              $online = $true
            }
            
            if ($online) {
              $failCount = 0
              $healthCount++
              Write-Host "[$timestamp] ✅ ONLINE | $ip | Uptime: $uptime | Checks: $healthCount"
            }
            else {
              $failCount++
              Write-Host "[$timestamp] ❌ OFFLINE ($failCount/3)"
              if ($failCount -ge 3) {
                Write-Host "[$timestamp] 🔄 Reconnecting..."
                tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=$hostname --advertise-exit-node --accept-routes --accept-dns=true
                $failCount = 0
                Start-Sleep -Seconds 15
              }
            }
            
            # Exit before 6‑hour timeout (350 minutes)
            if ($elapsed.TotalSeconds -ge 21000) {
              Write-Host "╔══════════════════════════════════════╗"
              Write-Host "║   TIMEOUT – GRACEFUL SHUTDOWN       ║"
              Write-Host "╚══════════════════════════════════════╝"
              Write-Host "Uptime: $uptime | Health checks: $healthCount"
              break
            }
            
            Start-Sleep -Seconds ${{ env.HEALTH_CHECK_INTERVAL }}
          }
        env:
          HEALTH_CHECK_INTERVAL: 180

  summary:
    needs: windows-exit-node
    if: always()
    runs-on: windows-latest
    steps:
      - run: |
          if ("${{ needs.windows-exit-node.result }}" -eq "success") {
            Write-Host "✅ EXIT NODE DEPLOYED (Windows)"
            Write-Host "IP: ${{ needs.windows-exit-node.outputs.exit_node_ip }}"
          } else {
            Write-Host "❌ DEPLOYMENT FAILED"
          }
