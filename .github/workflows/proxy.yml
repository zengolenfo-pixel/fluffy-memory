name: MAC-EXIT-RDP-BULLETPROOF-PERFECT

on:
  workflow_dispatch:
    inputs:
      exit_node_mode:
        description: 'Exit node operational mode'
        required: true
        default: 'performance'
        type: choice
        options:
          - performance
          - smooth
          - balanced

env:
  TAILSCALE_VERSION: "1.84.0"
  RDP_PORT: "3389"
  HEALTH_CHECK_INTERVAL: "180"
  TS_PORT: "41641"

jobs:
  exit-node-mac-perfect:
    runs-on: macos-latest
    timeout-minutes: 360
    
    outputs:
      exit_node_ip: ${{ steps.ts_connect.outputs.ts_ip }}
      exit_node_name: ${{ steps.credentials.outputs.hostname }}

    steps:
      - name: System information
        run: |
          echo "=== SYSTEM INFO ==="
          sw_vers
          uname -a
          echo "CPU: $(sysctl -n machdep.cpu.brand_string)"
          echo "RAM: $(( $(sysctl -n hw.memsize) / 1073741824 ))GB"
          df -h /

      - name: Generate credentials
        id: credentials
        run: |
          echo "=== CREDENTIALS ==="
          HOSTNAME="mac-$(date +%s | md5 | cut -c1-8)"
          RDP_USER="u$(echo $RANDOM$(date +%s) | md5 | cut -c1-10)"
          RDP_PASS="P$(echo $RANDOM$RANDOM$(date +%s) | md5 | cut -c1-18)!"
          
          echo "hostname=$HOSTNAME" >> $GITHUB_OUTPUT
          echo "username=$RDP_USER" >> $GITHUB_OUTPUT
          echo "password<<EOF" >> $GITHUB_OUTPUT
          echo "$RDP_PASS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Hostname: $HOSTNAME"
          echo "User: $RDP_USER"

      - name: Install Tailscale
        id: ts_install
        run: |
          echo "=== TAILSCALE INSTALL ==="
          
          # Stop any existing Tailscale processes
          sudo pkill -9 Tailscale 2>/dev/null || true
          sudo pkill -9 tailscaled 2>/dev/null || true
          sleep 2
          
          # Install via Homebrew cask
          brew install --cask tailscale 2>/dev/null || brew install tailscale 2>/dev/null || {
            echo "Direct install..."
            curl -fsSL https://pkgs.tailscale.com/stable/tailscale_${TAILSCALE_VERSION}_darwin_amd64.zip -o /tmp/ts.zip
            unzip -o /tmp/ts.zip -d /tmp/ts
            sudo cp /tmp/ts/tailscale_*/tailscale /usr/local/bin/
            sudo cp /tmp/ts/tailscale_*/tailscaled /usr/local/bin/
            sudo chmod +x /usr/local/bin/tailscale /usr/local/bin/tailscaled
          }
          
          # Find Tailscale binary
          TS_BIN=""
          for p in /usr/local/bin/tailscale /opt/homebrew/bin/tailscale; do
            [ -f "$p" ] && { TS_BIN="$p"; break; }
          done
          [ -z "$TS_BIN" ] && TS_BIN=$(which tailscale)
          
          echo "Binary: $TS_BIN"
          echo "ts_path=$TS_BIN" >> $GITHUB_OUTPUT

      - name: Start daemon and connect
        id: ts_connect
        timeout-minutes: 10
        run: |
          echo "=== START TAILSCALE ==="
          
          TS_BIN="${{ steps.ts_install.outputs.ts_path }}"
          HOSTNAME="${{ steps.credentials.outputs.hostname }}"
          TS_KEY="${{ secrets.TS_KEY }}"
          
          # Kill any existing
          sudo pkill -9 tailscaled 2>/dev/null || true
          sleep 2
          
          # Create directories
          sudo mkdir -p /var/lib/tailscale /var/run/tailscale 2>/dev/null
          
          # Start tailscaled
          echo "Starting tailscaled..."
          sudo tailscaled --port=${{ env.TS_PORT }} > /tmp/ts.log 2>&1 &
          TS_PID=$!
          
          # Wait for socket to appear (tailscaled creates it)
          echo "Waiting for daemon socket..."
          for i in $(seq 1 30); do
            if [ -S /var/run/tailscale/tailscaled.sock ]; then
              echo "Socket ready!"
              break
            fi
            # Also check if process is alive
            kill -0 $TS_PID 2>/dev/null || {
              echo "ERROR: tailscaled died!"
              cat /tmp/ts.log
              # Retry with different parameters
              sudo tailscaled --tun=userspace-networking --port=${{ env.TS_PORT }} > /tmp/ts2.log 2>&1 &
              TS_PID=$!
            }
            sleep 2
            [ $((i % 5)) -eq 0 ] && echo "Still waiting... ($i/30)"
          done
          
          # Now connect
          echo "Connecting to Tailscale..."
          for attempt in $(seq 1 5); do
            echo "Attempt $attempt..."
            if sudo $TS_BIN up \
              --authkey=$TS_KEY \
              --hostname=$HOSTNAME \
              --advertise-exit-node \
              --accept-routes \
              --accept-dns=true 2>&1; then
              echo "Connected!"
              break
            else
              echo "Connection failed, retrying in 10s..."
              sleep 10
            fi
          done
          
          # Get IP
          echo "Getting IP..."
          sleep 15
          TS_IP=""
          for i in $(seq 1 20); do
            TS_IP=$(sudo $TS_BIN ip -4 2>/dev/null)
            [[ $TS_IP == 100.* ]] && break
            sleep 3
          done
          
          if [[ ! $TS_IP == 100.* ]]; then
            echo "ERROR: No IP obtained"
            sudo $TS_BIN status 2>&1
            cat /tmp/ts.log
            exit 1
          fi
          
          echo "IP: $TS_IP"
          echo "ts_ip=$TS_IP" >> $GITHUB_OUTPUT

      - name: Monitor connection
        run: |
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║     EXIT NODE RUNNING (macOS)       ║"
          echo "╚══════════════════════════════════════╝"
          echo "Hostname: ${{ steps.credentials.outputs.hostname }}"
          echo "IP: ${{ steps.ts_connect.outputs.ts_ip }}"
          echo ""
          
          TS_BIN="${{ steps.ts_install.outputs.ts_path }}"
          HOSTNAME="${{ steps.credentials.outputs.hostname }}"
          TS_KEY="${{ secrets.TS_KEY }}"
          
          START=$(date +%s)
          HEALTH=0
          FAILS=0
          
          while true; do
            ELAPSED=$(($(date +%s) - START))
            H=$((ELAPSED/3600))
            M=$(((ELAPSED%3600)/60))
            
            # Check status
            STATUS=$(sudo $TS_BIN status 2>&1)
            IP=$(sudo $TS_BIN ip -4 2>/dev/null)
            
            if [[ $IP == 100.* ]] && echo "$STATUS" | grep -q "active"; then
              FAILS=0
              HEALTH=$((HEALTH+1))
              echo "[$H:$(printf %02d $M)] ✅ UP | IP: $IP | Checks: $HEALTH"
            else
              FAILS=$((FAILS+1))
              echo "[$H:$(printf %02d $M)] ⚠️ DOWN ($FAILS/3)"
              
              if [ $FAILS -ge 3 ]; then
                echo "Reconnecting..."
                sudo pkill -9 tailscaled 2>/dev/null
                sleep 3
                sudo tailscaled --port=${{ env.TS_PORT }} > /tmp/ts.log 2>&1 &
                sleep 10
                sudo $TS_BIN up \
                  --authkey=$TS_KEY \
                  --hostname=$HOSTNAME \
                  --advertise-exit-node \
                  --accept-routes \
                  --accept-dns=true 2>/dev/null
                FAILS=0
                sleep 15
              fi
            fi
            
            [ $ELAPSED -ge 21000 ] && {
              echo "Timeout approaching, exiting..."
              break
            }
            
            sleep ${{ env.HEALTH_CHECK_INTERVAL }}
          done

  summary:
    needs: exit-node-mac-perfect
    if: always()
    runs-on: macos-latest
    steps:
      - run: |
          echo "═══════════════════════════════════"
          if [ "${{ needs.exit-node-mac-perfect.result }}" = "success" ]; then
            echo "✅ EXIT NODE ACTIVE"
            echo "IP: ${{ needs.exit-node-mac-perfect.outputs.exit_node_ip }}"
            echo "Name: ${{ needs.exit-node-mac-perfect.outputs.exit_node_name }}"
          else
            echo "❌ FAILED"
          fi
          echo "═══════════════════════════════════"
